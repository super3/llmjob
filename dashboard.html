<style>
  :root {
    --bg: #FBFAF8;
    --panel: #FFFFFF;
    --panel-2: #F3F1EC;
    --panel-3: #E7E4DB;
    --line: #E4E1D9;
    --line-2: #D6D2C8;
    --ink: #16160F;
    --ink-2: #4A4A42;
    --ink-3: #86857C;
    --accent: oklch(0.58 0.21 256);
    --accent-soft: color-mix(in srgb, var(--accent) 12%, transparent);
    --online: oklch(0.62 0.17 150);
    --amber: oklch(0.68 0.15 70);
    --violet: oklch(0.56 0.18 300);
    font-synthesis-weight: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: "Space Grotesk", sans-serif; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .mono { font-family: "IBM Plex Mono", monospace; }
  .tnum { font-variant-numeric: tabular-nums; }
  a { color: inherit; text-decoration: none; }
  .wrap { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 32px; }

  /* app bar */
  header.bar { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: saturate(1.2) blur(12px); border-bottom: 1px solid transparent; transition: border-color .2s ease; }
  header.bar.scrolled { border-bottom-color: var(--line); }
  .bar-inner { display: flex; align-items: center; justify-content: space-between; height: 66px; }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 18px; letter-spacing: -0.01em; }
  .logo .bolt { width: 28px; height: 28px; border-radius: 8px; background: var(--ink); color: var(--bg); display: grid; place-items: center; }
  .bar-nav { display: flex; align-items: center; gap: 4px; }
  .bar-nav a { font-size: 14px; color: var(--ink-2); padding: 7px 13px; border-radius: 8px; transition: color .15s, background .15s; }
  .bar-nav a:hover { color: var(--ink); background: var(--panel-2); }
  .bar-nav a.active { color: var(--ink); background: var(--panel-2); }
  .bar-right { display: flex; align-items: center; gap: 14px; }
  .acct { display: inline-flex; align-items: center; gap: 8px; font-family: "IBM Plex Mono", monospace; font-size: 12.5px; color: var(--ink-2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 11px; }
  .acct .av { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; font-size: 10px; color: #fff; font-weight: 600; }
  .who { font-size: 15px; color: var(--ink-2); }
  .signout { font-family: "Space Grotesk", sans-serif; font-size: 15px; font-weight: 500; color: var(--ink); border: 1px solid var(--line-2); border-radius: 10px; padding: 13px 22px; transition: background .15s ease, border-color .15s ease; cursor: pointer; background: transparent; }
  .signout:hover { background: var(--panel-2); border-color: var(--ink-3); }
  @media (max-width: 760px) { .bar-nav { display: none; } }

  main { padding: 36px 0 80px; }
  .sec-title { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .sec-title h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .sec-title h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .sec-title .sub { font-size: 14px; color: var(--ink-3); margin-top: 3px; }

  /* shared table card */
  .card { margin-top: 18px; border: 1px solid var(--line); border-radius: 13px; overflow: hidden; background: var(--panel); }
  .tscroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 760px; }
  thead th { text-align: left; font-family: "IBM Plex Mono", monospace; font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; padding: 12px 16px; border-bottom: 1px solid var(--line); white-space: nowrap; background: var(--panel-2); }

  .ic-sq { width: 22px; height: 22px; border-radius: 6px; display: inline-grid; place-items: center; font-family: "IBM Plex Mono", monospace; font-size: 11px; font-weight: 600; color: #fff; flex: none; }

  .status.on { color: var(--online); }
  .status.off { color: var(--ink-3); }

  .vram-cell { min-width: 120px; }
  .vram-bar { height: 5px; background: var(--panel-3); border-radius: 99px; overflow: hidden; margin-top: 6px; width: 96px; }
  .vram-bar i { display: block; height: 100%; background: var(--accent); border-radius: 99px; }

  .pill { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--ink-2); background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 3px 8px; display: inline-flex; align-items: center; gap: 6px; }
  .pill.q { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 35%, transparent); }
  .pill.key { color: var(--ink-2); }
  .pill.key .k { width: 11px; height: 11px; color: var(--ink-3); }
  .finish { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--ink-2); }
  .dash { color: var(--ink-3); }

  .flag { background: none; border: none; cursor: pointer; color: var(--ink-3); padding: 4px; border-radius: 6px; transition: color .14s, background .14s; display: inline-grid; place-items: center; }
  .flag:hover { color: var(--ink-2); background: var(--panel-3); }
  .flag.on { color: var(--amber); }

  /* logs head controls */
  .logs-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-top: 36px; }
  .controls { display: flex; align-items: center; gap: 10px; }
  .ctrl-btn { width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel); color: var(--ink-2); display: grid; place-items: center; cursor: pointer; transition: color .14s, border-color .14s, background .14s; }
  .ctrl-btn:hover { color: var(--ink); border-color: var(--line-2); background: var(--panel-2); }
  .ctrl-btn.spin svg { animation: rot .8s linear infinite; }

  .time-pill { display: inline-flex; align-items: center; gap: 10px; border: 1px solid var(--line); background: var(--panel); border-radius: 99px; padding: 6px 13px 6px 8px; font-size: 13.5px; color: var(--ink); cursor: pointer; transition: border-color .14s; }
  .time-pill:hover { border-color: var(--line-2); }
  .time-pill .tag { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--ink-2); background: var(--panel-3); border-radius: 6px; padding: 2px 7px; }
  .time-pill .cv { color: var(--ink-3); }

  /* tabs */
  .tabs { display: flex; gap: 4px; margin-top: 22px; border-bottom: 1px solid var(--line); }
  .tab { font-size: 14px; color: var(--ink-3); padding: 10px 14px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .14s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }

  /* activity chart */
  .chart { margin-top: 26px; padding: 0 4px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 96px; }
  .chart-bars .b { flex: 1; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; opacity: .9; transition: opacity .14s; }
  .chart-bars .b:hover { opacity: 1; }
  .chart-bars .b.empty { background: var(--panel-3); }
  .chart-axis { display: flex; justify-content: space-between; margin-top: 10px; font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--ink-3); }
  .chart-y { position: relative; }
  .chart-y .yl { position: absolute; left: 0; font-family: "IBM Plex Mono", monospace; font-size: 10px; color: var(--ink-3); }

  .empty-state { padding: 56px 20px; text-align: center; color: var(--ink-3); font-family: "IBM Plex Mono", monospace; font-size: 13px; }
  .loading-row td { text-align: center; color: var(--ink-3); font-family: "IBM Plex Mono", monospace; font-size: 13px; padding: 40px 16px; }
  .page-loading { display: grid; place-items: center; min-height: 60vh; gap: 14px; color: var(--ink-3); }
  .spinner { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid var(--line-2); border-top-color: var(--accent); animation: rot .8s linear infinite; }

  .btn-add { display: inline-flex; align-items: center; gap: 7px; font-family: "Space Grotesk", sans-serif; font-size: 14px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 9px 15px; cursor: pointer; box-shadow: 0 6px 16px -10px var(--accent); transition: box-shadow .15s ease, transform .12s ease; }
  .btn-add:hover { box-shadow: 0 10px 22px -10px var(--accent); }
  .btn-add:active { transform: translateY(1px); }
  .node-actions { display: flex; align-items: center; gap: 16px; }

  .overlay { position: fixed; inset: 0; background: rgba(20,20,15,.45); display: grid; place-items: center; z-index: 200; padding: 20px; }
  .modal { width: 100%; max-width: 470px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 24px; box-shadow: 0 30px 70px -30px rgba(0,0,0,.4); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .modal .x { background: none; border: none; font-size: 22px; line-height: 1; color: var(--ink-3); cursor: pointer; padding: 0 6px; border-radius: 6px; }
  .modal .x:hover { color: var(--ink); background: var(--panel-2); }
  .modal p { font-size: 14px; color: var(--ink-2); margin-top: 12px; }
  .modal .hint { font-size: 12.5px; color: var(--ink-3); margin-top: 14px; }
  .cmd { display: flex; align-items: center; gap: 10px; margin-top: 14px; background: #15150F; border-radius: 9px; padding: 11px 13px; }
  .cmd code { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: #EDEAE0; flex: 1; overflow-x: auto; white-space: nowrap; }
  .cmd button { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: #A6A498; background: transparent; border: 1px solid #3A3A2E; border-radius: 6px; padding: 4px 9px; cursor: pointer; transition: color .14s, border-color .14s; flex: none; }
  .cmd button:hover { color: #ECEAE1; border-color: #5A5A48; }

  .field { margin-top: 16px; }
  .field label { display: block; font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 7px; }
  .field input { width: 100%; font-family: "Space Grotesk", sans-serif; font-size: 14px; padding: 10px 12px; border: 1px solid var(--line-2); border-radius: 9px; background: var(--bg); color: var(--ink); }
  .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .btn-sm { font-family: "Space Grotesk", sans-serif; font-size: 14px; font-weight: 500; border-radius: 9px; padding: 9px 16px; cursor: pointer; border: 1px solid var(--line-2); background: var(--panel); color: var(--ink); transition: background .14s, border-color .14s; }
  .btn-sm:hover { background: var(--panel-2); }
  .btn-sm[disabled] { opacity: .55; cursor: not-allowed; }
  .btn-sm.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-sm.primary:hover { background: color-mix(in srgb, var(--accent) 90%, #000); }
  .key-mask { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; color: var(--ink-2); }
  .revoke-btn { font-family: "IBM Plex Mono", monospace; font-size: 11.5px; color: var(--ink-3); background: none; border: 1px solid var(--line); border-radius: 7px; padding: 5px 11px; cursor: pointer; transition: color .14s, border-color .14s; }
  .revoke-btn:hover { color: oklch(0.55 0.19 25); border-color: oklch(0.72 0.13 25); }
  .newkey-box { display: flex; align-items: center; gap: 10px; margin-top: 14px; background: #15150F; border-radius: 9px; padding: 11px 13px; }
  .newkey-box code { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; color: #EDEAE0; flex: 1; overflow-x: auto; white-space: nowrap; }
  .newkey-box button { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: #A6A498; background: transparent; border: 1px solid #3A3A2E; border-radius: 6px; padding: 4px 9px; cursor: pointer; flex: none; }
  .newkey-box button:hover { color: #ECEAE1; border-color: #5A5A48; }

  .keys-search { display: flex; align-items: center; gap: 9px; margin: 14px 14px 0; padding: 9px 13px; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; }
  .keys-search svg { color: var(--ink-3); flex: none; }
  .keys-search input { border: none; background: none; outline: none; font-family: "Space Grotesk", sans-serif; font-size: 14px; color: var(--ink); width: 100%; }
  .keys-search input::placeholder { color: var(--ink-3); }
  .ck { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--line-2); display: inline-grid; place-items: center; cursor: pointer; color: #fff; transition: background .14s, border-color .14s; }
  .ck.on { background: var(--accent); border-color: var(--accent); }
  .keycell .kname { font-size: 14px; font-weight: 500; color: var(--ink); }
  .keycell .kmask { font-family: "IBM Plex Mono", monospace; font-size: 11.5px; color: var(--ink-3); margin-top: 3px; }
  .limit-cell { min-width: 150px; }
  .limit-top { display: flex; align-items: baseline; gap: 8px; }
  .limit-val { font-family: "IBM Plex Mono", monospace; font-size: 14px; color: var(--ink); }
  .limit-total { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: .08em; color: var(--ink-3); }
  .limit-bar { height: 5px; background: var(--panel-3); border-radius: 99px; margin-top: 7px; overflow: hidden; width: 130px; }
  .limit-bar i { display: block; height: 100%; background: var(--accent); border-radius: 99px; }
  .kebab { background: none; border: none; cursor: pointer; color: var(--ink-3); padding: 6px; border-radius: 7px; display: inline-grid; place-items: center; }
  .kebab:hover { color: var(--ink); background: var(--panel-2); }
  .menu-backdrop { position: fixed; inset: 0; z-index: 19; }
  .menu { position: absolute; right: 12px; top: 42px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 14px 36px -16px rgba(0,0,0,.3); padding: 5px; z-index: 20; min-width: 152px; }
  .menu button { display: flex; width: 100%; align-items: center; gap: 9px; font-family: "Space Grotesk", sans-serif; font-size: 13.5px; color: var(--ink); background: none; border: none; text-align: left; padding: 8px 10px; border-radius: 7px; cursor: pointer; }
  .menu button:hover { background: var(--panel-2); }
  .menu button.danger { color: oklch(0.55 0.19 25); }
  .keys-foot { padding: 12px 16px; border-top: 1px solid var(--line); font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--ink-3); }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

// Same origin in dev/prod as the rest of the site; falls back to the Railway
// API host when the static files are served from elsewhere.
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3001'
  : (window.location.origin || 'https://llmjob-production.up.railway.app');

const PALETTE = ['var(--accent)', 'var(--violet)', 'var(--amber)', 'var(--online)'];
const colorFor = (s) => {
  let h = 0;
  for (let i = 0; i < (s || '').length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
};
const initials = (s) => (s || '?').replace(/[^a-z0-9]/gi, "").slice(0, 2).toUpperCase();
const nodeColor = (d) => (d && (d.includes("Mac") || d.includes("M2"))) ? "var(--violet)" : "var(--accent)";

const fmtTokens = (n) => {
  if (n == null) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(n);
};
const relTime = (ts) => {
  if (!ts) return '—';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m} min ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} hr ago`;
  return `${Math.floor(h / 24)}d ago`;
};
const fmtLogTime = (ts) => {
  const d = new Date(ts);
  const date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const time = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  return `${date}, ${time}`;
};
// Five axis labels spanning the 24-hour activity window, oldest -> now.
const activityLabels = (now = Date.now()) => {
  const HOUR = 3600000;
  return [24, 18, 12, 6, 0].map((back) =>
    new Date(now - back * HOUR).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }));
};

const I = {

  refresh: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>,
  key: <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="15" r="4"/><path d="m10.5 12.5 7-7M16 6l2 2M19 3l2 2"/></svg>,
  chip: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M10 3v2M14 3v2M10 19v2M14 19v2M3 10h2M3 14h2M19 10h2M19 14h2"/></svg>,
  plus: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  search: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>,
  info: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>,
};

function NodesTable({ nodes, loading }) {
  return (
    <div className="card">
      <div className="tscroll">
        <table>
          <thead>
            <tr>
              <th>Node</th><th>Device</th><th>Status</th><th>Serving</th>
              <th className="num">Uptime</th>
            </tr>
          </thead>
          <tbody>
            {loading && <tr className="loading-row"><td colSpan="5">Loading nodes…</td></tr>}
            {!loading && nodes.length === 0 && (
              <tr><td colSpan="5"><div className="empty-state">No nodes yet. Click “Add node” to connect one.</div></td></tr>
            )}
            {!loading && nodes.map((n) => (
              <tr key={n.nodeId}>
                <td>
                  <span className="cell-ic">
                    <span className="ic-sq" style={{ background: nodeColor(n.device) }}>{I.chip}</span>
                    <span className="nm mono">{n.name}</span>
                  </span>
                </td>
                <td className="mono" style={{ color: "var(--ink-2)" }}>{n.device ? `${n.device}${n.vramTotal != null ? ` · ${n.vramTotal}GB` : ''}` : <span className="dash">—</span>}</td>
                <td><span className={`status ${n.status === "online" ? "on" : "off"}`}><span className={`dot ${n.status === "online" ? "on" : "off"}`}></span> {n.status}</span></td>
                <td>{n.model
                  ? <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><span className="mono" style={{ color: "var(--ink)" }}>{n.model}</span>{n.quant && <span className="pill q">{n.quant}</span>}</span>
                  : <span className="dash mono">idle</span>}</td>
                <td className="num mono" style={{ color: "var(--ink-2)" }}>{n.uptime || <span className="dash">—</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function ActivityChart({ activity, now }) {
  const max = Math.max(1, ...activity);
  const labels = activityLabels(now);
  return (
    <div className="chart">
      <div className="chart-y" style={{ paddingLeft: 30 }}>
        <span className="yl" style={{ top: 0 }}>{max}</span>
        <span className="yl" style={{ top: "50%" }}>{Math.round(max / 2)}</span>
        <div className="chart-bars">
          {activity.map((v, i) => (
            <div key={i} className={`b ${v === 0 ? "empty" : ""}`} style={{ height: v === 0 ? 2 : (v / max * 96) + "px" }} title={v + " requests"}></div>
          ))}
        </div>
      </div>
      <div className="chart-axis" style={{ paddingLeft: 30 }}>
        {labels.map((l, i) => <span key={i}>{l}</span>)}
      </div>
    </div>
  );
}

function LogsTable({ logs, loading }) {
  return (
    <div className="card">
      <div className="tscroll">
        <table style={{ minWidth: 900 }}>
          <thead>
            <tr>
              <th>Time</th><th>Model</th><th>Node</th><th>App</th>
              <th className="num">Input</th><th className="num">Output</th>
              <th className="num">Speed</th><th>Finish</th><th>Key</th>
            </tr>
          </thead>
          <tbody>
            {loading && <tr className="loading-row"><td colSpan="9">Loading logs…</td></tr>}
            {!loading && logs.length === 0 && (
              <tr><td colSpan="9"><div className="empty-state">No requests logged yet.</div></td></tr>
            )}
            {!loading && logs.map((r) => (
              <tr key={r.id}>
                <td className="mono" style={{ color: "var(--ink-2)" }}>{fmtLogTime(r.timestamp)}</td>
                <td>
                  <span className="cell-ic">
                    <span className="ic-sq" style={{ background: colorFor(r.model) }}>{initials(r.model)}</span>
                    <span className="nm">{r.model}</span>
                  </span>
                </td>
                <td className="mono" style={{ color: "var(--ink-2)" }}>{r.node}</td>
                <td style={{ color: "var(--ink-2)" }}>{r.app}</td>
                <td className="num mononum">{fmtTokens(r.in)}<span className="unit">tok</span></td>
                <td className="num mononum">{fmtTokens(r.out)}<span className="unit">tok</span></td>
                <td className="num mononum">{(r.speed || 0).toFixed(1)}<span className="unit">tok/s</span></td>
                <td><span className="finish">{r.finish}</span></td>
                <td>{r.key ? <span className="pill key"><span className="k">{I.key}</span> {r.key}</span> : <span className="dash">—</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [scrolled, setScrolled] = useState(false);
  const [ready, setReady] = useState(false);
  const [authError, setAuthError] = useState(false);
  const [username, setUsername] = useState('');

  const [nodes, setNodes] = useState([]);
  const [keys, setKeys] = useState([]);
  const [logs, setLogs] = useState([]);
  const [activity, setActivity] = useState(new Array(24).fill(0));
  const [refreshing, setRefreshing] = useState(false);

  // add-node modal
  const [showAdd, setShowAdd] = useState(false);
  const [copied, setCopied] = useState(false);
  const JOIN = "curl -fsSL https://llmjob.dev/join | sh";
  const copyJoin = () => { navigator.clipboard && navigator.clipboard.writeText(JOIN).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); }); };

  // create-key modal
  const [showCreate, setShowCreate] = useState(false);
  const [newKeyName, setNewKeyName] = useState("");
  const [genKey, setGenKey] = useState(null);
  const [creating, setCreating] = useState(false);
  const [copiedKey, setCopiedKey] = useState(false);
  const [keyQuery, setKeyQuery] = useState("");

  const authedFetch = useCallback(async (path, opts = {}) => {
    const token = await window.Clerk.session.getToken();
    const headers = { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) };
    if (opts.body) headers['Content-Type'] = 'application/json';
    return fetch(`${API_BASE}${path}`, { ...opts, headers });
  }, []);

  const loadNodes = useCallback(async () => {
    const res = await authedFetch('/api/nodes');
    if (res.ok) setNodes(((await res.json()).nodes) || []);
  }, [authedFetch]);
  const loadKeys = useCallback(async () => {
    const res = await authedFetch('/api/keys');
    if (res.ok) setKeys(((await res.json()).keys) || []);
  }, [authedFetch]);
  const loadLogs = useCallback(async () => {
    const res = await authedFetch('/api/logs');
    if (res.ok) {
      const d = await res.json();
      setLogs(d.logs || []);
      setActivity((d.activity && d.activity.length) ? d.activity : new Array(24).fill(0));
    }
  }, [authedFetch]);

  const refreshAll = useCallback(async () => {
    setRefreshing(true);
    try { await Promise.all([loadNodes(), loadKeys(), loadLogs()]); }
    catch (e) { console.error('Refresh failed:', e); }
    finally { setRefreshing(false); }
  }, [loadNodes, loadKeys, loadLogs]);

  // scroll shadow
  useEffect(() => {
    const onS = () => setScrolled(window.scrollY > 8);
    window.addEventListener("scroll", onS); onS();
    return () => window.removeEventListener("scroll", onS);
  }, []);

  // Clerk gate + initial load
  useEffect(() => {
    let cancelled = false;
    (async () => {
      if (typeof window.Clerk === 'undefined') { setAuthError(true); return; }
      await window.Clerk.load();
      if (!window.Clerk.user) {
        // Not signed in: send them through Clerk's sign-in, returning here after.
        if (window.Clerk.redirectToSignIn) {
          window.Clerk.redirectToSignIn({ afterSignInUrl: window.location.href, afterSignUpUrl: window.location.href });
        } else {
          window.location.href = 'index.html';
        }
        return;
      }
      if (cancelled) return;
      const u = window.Clerk.user;
      const email = u.primaryEmailAddress && u.primaryEmailAddress.emailAddress;
      setUsername(u.username || u.firstName || email || 'account');
      await refreshAll();
      if (!cancelled) setReady(true);
    })();
    return () => { cancelled = true; };
  }, [refreshAll]);

  const signOut = () => {
    if (window.Clerk && window.Clerk.signOut) {
      window.Clerk.signOut().then(() => { window.location.href = 'index.html'; });
    } else {
      window.location.href = 'index.html';
    }
  };

  const openCreate = () => { setNewKeyName(""); setGenKey(null); setCopiedKey(false); setShowCreate(true); };
  const createKey = async () => {
    setCreating(true);
    try {
      const res = await authedFetch('/api/keys', { method: 'POST', body: JSON.stringify({ name: newKeyName.trim() || 'untitled' }) });
      if (res.ok) {
        const data = await res.json();
        setGenKey(data.key);
        await loadKeys();
      }
    } catch (e) { console.error('Create key failed:', e); }
    finally { setCreating(false); }
  };
  const copyNewKey = () => { navigator.clipboard && genKey && navigator.clipboard.writeText(genKey).then(() => { setCopiedKey(true); setTimeout(() => setCopiedKey(false), 1500); }); };
  const closeCreate = () => { setShowCreate(false); setGenKey(null); setNewKeyName(""); };
  const revoke = async (id) => {
    const res = await authedFetch(`/api/keys/${id}`, { method: 'DELETE' });
    if (res.ok) await loadKeys();
  };

  const shownKeys = keys.filter(k => k.name.toLowerCase().includes(keyQuery.toLowerCase()));
  const onlineCount = nodes.filter(n => n.status === 'online').length;

  if (authError) {
    return (
      <div className="page-loading">
        <div>Authentication unavailable. <a href="index.html" style={{ color: "var(--accent)" }}>Return home</a></div>
      </div>
    );
  }
  if (!ready) {
    return (
      <React.Fragment>
        <header className="bar">
          <div className="wrap bar-inner">
            <a className="logo" href="index.html"><span className="bolt">{I.bolt}</span> LLMJob</a>
          </div>
        </header>
        <div className="page-loading"><div className="spinner"></div><div>Loading your console…</div></div>
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      <header className={`bar ${scrolled ? "scrolled" : ""}`}>
        <div className="wrap bar-inner">
          <a className="logo" href="index.html"><span className="bolt">{I.bolt}</span> LLMJob</a>
          <div className="bar-right">
            <span className="who">{username}</span>
            <button className="signout" onClick={signOut}>Sign out</button>
          </div>
        </div>
      </header>

      <main>
        <div className="wrap">
          {/* NODES */}
          <section id="nodes">
            <div className="sec-title">
              <div>
                <h1>Nodes</h1>
                <div className="sub">The machines connected to your cluster.</div>
              </div>
              <div className="node-actions">
                <span className={`status ${onlineCount > 0 ? 'on' : 'off'}`} style={{ fontSize: 13 }}><span className={`dot ${onlineCount > 0 ? 'on' : 'off'}`}></span> {onlineCount} online</span>
                <button className="btn-add" onClick={() => { setCopied(false); setShowAdd(true); }}>{I.plus} Add node</button>
              </div>
            </div>
            <NodesTable nodes={nodes} loading={false} />
          </section>

          {/* API KEYS */}
          <section id="keys" style={{ marginTop: 48 }}>
            <div className="sec-title">
              <div>
                <h2>API keys</h2>
                <div className="sub" style={{ display: "flex", alignItems: "center", gap: 6 }}>Create and manage your API keys. <span style={{ display: "inline-flex", color: "var(--ink-3)" }}>{I.info}</span></div>
              </div>
              <button className="btn-add" onClick={openCreate}>{I.plus} New key</button>
            </div>
            <div className="card">
              {keys.length > 0 && (
                <div className="keys-search">
                  {I.search}
                  <input value={keyQuery} onChange={e => setKeyQuery(e.target.value)} placeholder="Search keys…" />
                </div>
              )}
              <div className="tscroll">
                <table style={{ minWidth: 860 }}>
                  <thead>
                    <tr>
                      <th>Name</th><th>Key</th><th>Last used</th><th>Usage</th><th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {shownKeys.map((k) => (
                      <tr key={k.id}>
                        <td><span className="kname">{k.name}</span></td>
                        <td><span className="kmask">{k.masked}</span></td>
                        <td style={{ color: "var(--ink-2)" }}>{relTime(k.lastUsed)}</td>
                        <td className="mono" style={{ color: "var(--ink)" }}>{fmtTokens(k.usage)}<span className="unit">tok</span></td>
                        <td className="num"><button className="revoke-btn" onClick={() => revoke(k.id)}>Revoke</button></td>
                      </tr>
                    ))}
                    {keys.length === 0 && <tr><td colSpan="5"><div className="empty-state">No API keys yet. Create one to start making requests.</div></td></tr>}
                    {keys.length > 0 && shownKeys.length === 0 && <tr><td colSpan="5"><div className="empty-state">No keys match “{keyQuery}”.</div></td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          {/* LOGS */}
          <section id="logs">
            <div className="logs-head">
              <div>
                <h2>Logs</h2>
                <div className="sub">View your request logs and history.</div>
              </div>
              <div className="controls">
                <button className={`ctrl-btn ${refreshing ? 'spin' : ''}`} title="Refresh" onClick={refreshAll} disabled={refreshing}>{I.refresh}</button>
              </div>
            </div>

            <ActivityChart activity={activity} now={Date.now()} />
            <LogsTable logs={logs} loading={false} />
          </section>
        </div>
      </main>

      {showAdd && (
        <div className="overlay" onClick={() => setShowAdd(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>Add a node</h3>
              <button className="x" onClick={() => setShowAdd(false)}>×</button>
            </div>
            <p>Run this on the machine you want to add to your cluster:</p>
            <div className="cmd">
              <code>{JOIN}</code>
              <button onClick={copyJoin}>{copied ? "copied" : "copy"}</button>
            </div>
            <p className="hint">It'll show up here automatically once it connects.</p>
          </div>
        </div>
      )}

      {showCreate && (
        <div className="overlay" onClick={closeCreate}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>Create API key</h3>
              <button className="x" onClick={closeCreate}>×</button>
            </div>
            {!genKey ? (
              <React.Fragment>
                <div className="field">
                  <label>Key name</label>
                  <input value={newKeyName} onChange={e => setNewKeyName(e.target.value)} placeholder="e.g. laptop" autoFocus
                    onKeyDown={e => { if (e.key === 'Enter' && !creating) createKey(); }} />
                </div>
                <div className="modal-actions">
                  <button className="btn-sm" onClick={closeCreate}>Cancel</button>
                  <button className="btn-sm primary" onClick={createKey} disabled={creating}>{creating ? 'Creating…' : 'Create key'}</button>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <p>Here's your new key. Copy it now — you won't be able to see it again.</p>
                <div className="newkey-box">
                  <code>{genKey}</code>
                  <button onClick={copyNewKey}>{copiedKey ? "copied" : "copy"}</button>
                </div>
                <div className="modal-actions">
                  <button className="btn-sm primary" onClick={closeCreate}>Done</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
