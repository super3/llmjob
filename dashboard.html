<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLMJob — Console</title>

<!-- Umami Analytics -->
<script defer src="https://cloud.umami.is/script.js" data-website-id="df101f2e-01ef-46ef-b682-f8c553ae594f"></script>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%2316160F%22/><path transform=%22translate(26,26) scale(2)%22 d=%22M13 2 L4 14 h6 l-1 8 10-13 h-7 l1-7 z%22 fill=%22%23FBFAF8%22/></svg>">

<!-- Clerk Authentication -->
<script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsubGxtam9iLmNvbSQ"
    src="https://clerk.llmjob.com/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FBFAF8;
    --panel: #FFFFFF;
    --panel-2: #faf9f6;
    --line: #E4E1D9;
    --line-2: #D6D2C8;
    --row: #f4f3ee;
    --ink: #16160F;
    --ink-2: #3d4148;
    --ink-3: #8a8f98;
    --ink-4: #9a9da1;
    --muted: #6b7077;
    --accent: #2563eb;
    --accent-soft: #eff4ff;
    --accent-line: #dbe6fb;
    --online: #16a34a;
    --violet: #7c5cff;
    --amber: #d9920a;
    font-synthesis-weight: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  ::selection { background: #cfe0ff; }
  body { background: var(--bg); color: var(--ink); font-family: "Schibsted Grotesk", sans-serif; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .mono { font-family: "IBM Plex Mono", monospace; }
  .mononum { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  a { color: inherit; text-decoration: none; }
  .wrap { width: 100%; max-width: 1080px; margin: 0 auto; padding: 0 28px; }

  @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--online) 50%, transparent); } 70% { box-shadow: 0 0 0 6px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
  @keyframes rot { to { transform: rotate(360deg); } }
  @keyframes cnPulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

  /* app bar */
  header.bar { border-bottom: 1px solid #ECE9E1; background: var(--bg); }
  .bar-inner { display: flex; align-items: center; justify-content: space-between; padding: 26px 0; }
  .logo { display: inline-flex; align-items: center; gap: 11px; font-weight: 700; font-size: 21px; letter-spacing: -0.02em; }
  .logo .bolt { width: 38px; height: 38px; border-radius: 11px; background: var(--ink); color: var(--bg); display: grid; place-items: center; }
  .bar-right { display: flex; align-items: center; gap: 18px; }
  .who { font-size: 14.5px; color: var(--muted); font-weight: 500; }
  .signout { font-family: inherit; font-size: 14px; font-weight: 600; color: var(--bg); background: var(--ink); border: none; border-radius: 9px; padding: 9px 18px; cursor: pointer; transition: opacity .15s ease; }
  .signout:hover { opacity: .9; }

  main { padding: 40px 0 56px; }
  .sec-title { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .sec-title h1, .sec-title h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
  .sec-title .sub { font-size: 15px; color: var(--ink-3); margin-top: 6px; }
  .node-actions { display: flex; align-items: center; gap: 16px; }

  .btn-add { display: inline-flex; align-items: center; gap: 7px; font-family: inherit; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 10px 17px; cursor: pointer; box-shadow: 0 6px 16px -8px rgba(37,99,235,.7); transition: box-shadow .15s ease, transform .12s ease; }
  .btn-add:hover { box-shadow: 0 10px 22px -8px rgba(37,99,235,.7); }
  .btn-add:active { transform: translateY(1px); }
  .btn-add.btn-dark { background: var(--ink); color: var(--bg); box-shadow: none; }
  .btn-add.btn-dark:hover { box-shadow: 0 8px 18px -10px rgba(22,22,15,.55); }

  /* shared table card */
  .card { margin-top: 18px; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: var(--panel); }
  .tscroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 760px; }
  thead th { text-align: left; font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-4); font-weight: 600; padding: 13px 20px; border-bottom: 1px solid #f0ede5; white-space: nowrap; background: var(--panel-2); }
  th.num, td.num { text-align: right; }
  tbody td { padding: 15px 20px; border-bottom: 1px solid var(--row); font-size: 13.5px; white-space: nowrap; vertical-align: middle; color: var(--ink-2); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: var(--panel-2); }

  .cell-ic { display: inline-flex; align-items: center; gap: 9px; }
  .ic-sq { width: 22px; height: 22px; border-radius: 6px; display: inline-grid; place-items: center; background: var(--accent-soft); color: var(--accent); flex: none; }
  .cell-ic .nm { color: var(--ink); }
  .nm { font-weight: 600; }
  .unit { color: #a7abb2; font-size: 11px; margin-left: 3px; }

  .status { display: inline-flex; align-items: center; gap: 7px; font-family: "IBM Plex Mono", monospace; font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.on { background: var(--online); box-shadow: 0 0 0 0 color-mix(in srgb, var(--online) 60%, transparent); animation: pulse 2.6s ease-out infinite; }
  .dot.off { background: var(--ink-4); }
  .status.on { color: var(--online); }
  .status.off { color: var(--ink-4); }

  .pill { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--ink-2); background: var(--panel-2); border: 1px solid var(--line); border-radius: 5px; padding: 2px 6px; display: inline-flex; align-items: center; gap: 6px; }
  .pill.q { color: var(--accent); background: var(--accent-soft); border-color: var(--accent-line); }
  .pill.key { color: var(--muted); background: var(--row); border: none; border-radius: 6px; padding: 3px 8px; font-size: 11.5px; }
  .pill.key .k { width: 11px; height: 11px; color: var(--ink-4); display: inline-flex; }
  .finish { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; color: var(--muted); }
  .dash { color: var(--ink-4); }

  /* node mining toggle */
  .vis-cell { display: inline-flex; align-items: center; gap: 9px; }
  .vtoggle { width: 34px; height: 20px; border-radius: 11px; background: #d8d5cc; border: none; cursor: pointer; position: relative; transition: background .16s; flex: none; padding: 0; }
  .vtoggle.on { background: var(--accent); }
  .vtoggle .knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .16s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .vtoggle.on .knob { transform: translateX(14px); }
  .vlabel { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; }
  .vlabel.pub { color: var(--accent); }
  .vlabel.priv { color: var(--ink-4); }

  /* logs head controls */
  .logs-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-top: 44px; }
  .controls { display: flex; align-items: center; gap: 10px; }
  .ctrl-btn { width: 40px; height: 40px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel); color: var(--muted); display: grid; place-items: center; cursor: pointer; transition: color .14s, border-color .14s, background .14s; }
  .ctrl-btn:hover { color: var(--ink); border-color: var(--line-2); background: var(--panel-2); }
  .ctrl-btn.spin svg { animation: rot .8s linear infinite; }

  .empty-state { padding: 56px 20px; text-align: center; color: var(--ink-4); font-family: "IBM Plex Mono", monospace; font-size: 13px; }
  .loading-row td { text-align: center; color: var(--ink-4); font-family: "IBM Plex Mono", monospace; font-size: 13px; padding: 40px 16px; }
  .page-loading { display: grid; place-items: center; min-height: 60vh; gap: 14px; color: var(--ink-3); }
  .page-loading a { color: var(--accent); }
  .spinner { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid var(--line); border-top-color: var(--accent); animation: rot .8s linear infinite; }

  /* api keys */
  .kname { font-size: 14px; font-weight: 500; color: var(--ink); }
  .kmask { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--muted); }
  .revoke-btn { font-family: inherit; font-size: 12.5px; font-weight: 600; color: #9a5050; background: none; border: 1px solid #e7d5d5; border-radius: 7px; padding: 5px 12px; cursor: pointer; transition: color .14s, border-color .14s, background .14s; }
  .revoke-btn:hover { color: #7e3d3d; border-color: #dcc3c3; background: #faf6f6; }

  /* modals */
  .overlay { position: fixed; inset: 0; background: rgba(20,20,15,.45); display: grid; place-items: center; z-index: 200; padding: 20px; }
  .modal { width: 100%; max-width: 470px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 24px; box-shadow: 0 30px 70px -30px rgba(0,0,0,.4); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .modal .x { background: none; border: none; font-size: 22px; line-height: 1; color: var(--ink-4); cursor: pointer; padding: 0 6px; border-radius: 6px; }
  .modal .x:hover { color: var(--ink); background: var(--panel-2); }
  .modal p { font-size: 14px; color: var(--ink-2); margin-top: 12px; }
  .modal .hint { font-size: 12.5px; color: var(--ink-3); margin-top: 14px; }
  .cmd { display: flex; align-items: center; gap: 10px; margin-top: 14px; background: #15150F; border-radius: 9px; padding: 11px 13px; }
  .cmd code { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: #EDEAE0; flex: 1; overflow-x: auto; white-space: nowrap; }
  .cmd button { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: #A6A498; background: transparent; border: 1px solid #3A3A2E; border-radius: 6px; padding: 4px 9px; cursor: pointer; transition: color .14s, border-color .14s; flex: none; }
  .cmd button:hover { color: #ECEAE1; border-color: #5A5A48; }
  .add-step-p { font-size: 13px; color: var(--ink-2); margin-top: 8px; line-height: 1.5; }
  .add-step-p a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }

  .field { margin-top: 16px; }
  .field label { display: block; font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 7px; }
  .field input { width: 100%; font-family: inherit; font-size: 14px; padding: 10px 12px; border: 1px solid var(--line-2); border-radius: 9px; background: var(--bg); color: var(--ink); }
  .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .btn-sm { font-family: inherit; font-size: 14px; font-weight: 500; border-radius: 9px; padding: 9px 16px; cursor: pointer; border: 1px solid var(--line-2); background: var(--panel); color: var(--ink); transition: background .14s, border-color .14s; }
  .btn-sm:hover { background: var(--panel-2); }
  .btn-sm[disabled] { opacity: .55; cursor: not-allowed; }
  .btn-sm.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-sm.primary:hover { background: #1f56d6; }
  .newkey-box { display: flex; align-items: center; gap: 10px; margin-top: 14px; background: #15150F; border-radius: 9px; padding: 11px 13px; }
  .newkey-box code { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; color: #EDEAE0; flex: 1; overflow-x: auto; white-space: nowrap; }
  .newkey-box button { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: #A6A498; background: transparent; border: 1px solid #3A3A2E; border-radius: 6px; padding: 4px 9px; cursor: pointer; flex: none; }
  .newkey-box button:hover { color: #ECEAE1; border-color: #5A5A48; }

  @media (max-width: 640px) { .sec-title h1, .sec-title h2 { font-size: 24px; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

// Talk to the local API in dev, and to the Railway API host in production.
// The dashboard is also published to GitHub Pages, which has no API, so we
// only treat the page origin as the API when it's actually the Railway app —
// otherwise window.location.origin would point /api/* requests at a host that
// returns 404 for them.
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3001'
  : (window.location.hostname.endsWith('.railway.app')
      ? window.location.origin
      : 'https://llmjob-production.up.railway.app');

const PALETTE = ['var(--accent)', 'var(--violet)', 'var(--amber)', 'var(--online)'];
const colorFor = (s) => {
  let h = 0;
  for (let i = 0; i < (s || '').length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
};
const initials = (s) => (s || '?').replace(/[^a-z0-9]/gi, "").slice(0, 2).toUpperCase();
const nodeColor = (d) => (d && (d.includes("Mac") || d.includes("M2"))) ? "var(--violet)" : "var(--accent)";

const fmtTokens = (n) => {
  if (n == null) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(n);
};
const relTime = (ts) => {
  if (!ts) return '—';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m} min ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} hr ago`;
  return `${Math.floor(h / 24)}d ago`;
};
const fmtLogTime = (ts) => {
  const d = new Date(ts);
  const date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const time = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  return `${date}, ${time}`;
};
const I = {
  bolt: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 L4 14 h6 l-1 8 10-13 h-7 l1-7 z"/></svg>,
  refresh: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>,
  key: <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="15" r="4"/><path d="m10.5 12.5 7-7M16 6l2 2M19 3l2 2"/></svg>,
  chip: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M10 3v2M14 3v2M10 19v2M14 19v2M3 10h2M3 14h2M19 10h2M19 14h2"/></svg>,
  plus: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  info: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>,
};

function NodesTable({ nodes, loading }) {
  // Per-node Mining toggle is a visual control; default to on, then track
  // local overrides keyed by node id.
  const [pub, setPub] = useState({});
  const isPub = (n) => pub[n.nodeId] !== undefined ? pub[n.nodeId] : (n.public !== false);
  const toggle = (n) => setPub(p => ({ ...p, [n.nodeId]: !isPub(n) }));
  return (
    <div className="card">
      <div className="tscroll">
        <table>
          <thead>
            <tr>
              <th>Node</th><th>Device</th><th>Status</th><th>Model</th>
              <th>Mining</th><th className="num">Uptime</th>
            </tr>
          </thead>
          <tbody>
            {loading && <tr className="loading-row"><td colSpan="6">Loading nodes…</td></tr>}
            {!loading && nodes.length === 0 && (
              <tr><td colSpan="6"><div className="empty-state">No nodes yet. Click “Add node” to connect one.</div></td></tr>
            )}
            {!loading && nodes.map((n) => (
              <tr key={n.nodeId}>
                <td>
                  <span className="cell-ic">
                    <span className="ic-sq">{I.chip}</span>
                    <span className="nm mono">{n.name}</span>
                  </span>
                </td>
                <td className="mono" style={{ color: "var(--ink-2)" }}>{n.device ? `${n.device}${n.vramTotal != null ? ` · ${n.vramTotal}GB` : ''}` : <span className="dash">—</span>}</td>
                <td><span className={`status ${n.status === "online" ? "on" : "off"}`}><span className={`dot ${n.status === "online" ? "on" : "off"}`}></span> {n.status}</span></td>
                <td>{n.model
                  ? <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><span className="mono" style={{ color: "var(--ink)" }}>{n.model}</span>{n.quant && <span className="pill q">{n.quant}</span>}</span>
                  : <span className="dash mono">idle</span>}</td>
                <td>
                  <span className="vis-cell">
                    <button className={`vtoggle ${isPub(n) ? "on" : ""}`} onClick={() => toggle(n)} role="switch" aria-checked={isPub(n)} title={isPub(n) ? "Mining enabled" : "Mining paused"}><span className="knob"></span></button>
                    <span className={`vlabel ${isPub(n) ? "pub" : "priv"}`}>{isPub(n) ? "On" : "Off"}</span>
                  </span>
                </td>
                <td className="num mono" style={{ color: "var(--ink-2)" }}>{n.uptime || <span className="dash">—</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function LogsTable({ logs, loading }) {
  return (
    <div className="card">
      <div className="tscroll">
        <table style={{ minWidth: 640 }}>
          <thead>
            <tr>
              <th>Time</th><th>Model</th><th>Node</th>
              <th className="num">Input</th><th className="num">Output</th>
              <th>Speed</th><th>Finish</th><th>Key</th>
            </tr>
          </thead>
          <tbody>
            {loading && <tr className="loading-row"><td colSpan="8">Loading logs…</td></tr>}
            {!loading && logs.length === 0 && (
              <tr><td colSpan="8"><div className="empty-state">No requests logged yet.</div></td></tr>
            )}
            {!loading && logs.map((r) => (
              <tr key={r.id}>
                <td className="mono" style={{ color: "var(--ink-2)" }}>{fmtLogTime(r.timestamp)}</td>
                <td>
                  <span className="cell-ic">
                    <span className="nm">{r.model}</span>
                  </span>
                </td>
                <td className="mono" style={{ color: "var(--ink-2)" }}>{r.node}</td>
                <td className="num mononum">{fmtTokens(r.in)}</td>
                <td className="num mononum">{fmtTokens(r.out)}</td>
                <td className="mononum">{(r.speed || 0).toFixed(1)}<span className="unit">tok/s</span></td>
                <td><span className="finish">{r.finish}</span></td>
                <td>{r.key ? <span className="pill key"><span className="k">{I.key}</span> {r.key}</span> : <span className="dash">—</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [scrolled, setScrolled] = useState(false);
  const [ready, setReady] = useState(false);
  const [authError, setAuthError] = useState(false);
  const [username, setUsername] = useState('');

  const [nodes, setNodes] = useState([]);
  const [keys, setKeys] = useState([]);
  const [logs, setLogs] = useState([]);
  const [refreshing, setRefreshing] = useState(false);

  const authedFetch = useCallback(async (path, opts = {}) => {
    const token = await window.Clerk.session.getToken();
    const headers = { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) };
    if (opts.body) headers['Content-Type'] = 'application/json';
    return fetch(`${API_BASE}${path}`, { ...opts, headers });
  }, []);

  // add-node modal
  const [showAdd, setShowAdd] = useState(false);
  const [copiedCmd, setCopiedCmd] = useState(null);
  const [joinToken, setJoinToken] = useState(null);
  const [joinLoading, setJoinLoading] = useState(false);
  const copyCmd = (i, text) => { navigator.clipboard && navigator.clipboard.writeText(text).then(() => { setCopiedCmd(i); setTimeout(() => setCopiedCmd(null), 1500); }); };
  const loadJoinToken = useCallback(async () => {
    setJoinLoading(true);
    try {
      const res = await authedFetch('/api/nodes/join-token');
      if (res.ok) setJoinToken((await res.json()).token);
    } catch (e) { console.error('Join token failed:', e); }
    finally { setJoinLoading(false); }
  }, [authedFetch]);
  const rotateToken = async () => {
    setJoinLoading(true);
    try {
      const res = await authedFetch('/api/nodes/join-token/rotate', { method: 'POST' });
      if (res.ok) setJoinToken((await res.json()).token);
    } catch (e) { console.error('Rotate token failed:', e); }
    finally { setJoinLoading(false); }
  };
  const openAdd = () => { setCopiedCmd(null); setShowAdd(true); if (!joinToken) loadJoinToken(); };
  const installCmd = joinToken ? `curl -fsSL ${API_BASE}/install.sh/${joinToken} | bash` : '';

  // create-key modal
  const [showCreate, setShowCreate] = useState(false);
  const [newKeyName, setNewKeyName] = useState("");
  const [genKey, setGenKey] = useState(null);
  const [creating, setCreating] = useState(false);
  const [copiedKey, setCopiedKey] = useState(false);
  const [copiedEndpoint, setCopiedEndpoint] = useState(false);

  const loadNodes = useCallback(async () => {
    const res = await authedFetch('/api/nodes');
    if (res.ok) setNodes(((await res.json()).nodes) || []);
  }, [authedFetch]);
  const loadKeys = useCallback(async () => {
    const res = await authedFetch('/api/keys');
    if (res.ok) setKeys(((await res.json()).keys) || []);
  }, [authedFetch]);
  const loadLogs = useCallback(async () => {
    const res = await authedFetch('/api/logs');
    if (res.ok) {
      const d = await res.json();
      setLogs(d.logs || []);
    }
  }, [authedFetch]);

  const refreshAll = useCallback(async () => {
    setRefreshing(true);
    try { await Promise.all([loadNodes(), loadKeys(), loadLogs()]); }
    catch (e) { console.error('Refresh failed:', e); }
    finally { setRefreshing(false); }
  }, [loadNodes, loadKeys, loadLogs]);

  // scroll shadow
  useEffect(() => {
    const onS = () => setScrolled(window.scrollY > 8);
    window.addEventListener("scroll", onS); onS();
    return () => window.removeEventListener("scroll", onS);
  }, []);

  // Clerk gate + initial load
  useEffect(() => {
    let cancelled = false;
    // The Clerk script loads async, so window.Clerk may not exist yet when this
    // effect first runs. Wait for it to appear before deciding auth is unavailable.
    const waitForClerk = async (timeoutMs = 10000) => {
      const start = Date.now();
      while (typeof window.Clerk === 'undefined') {
        if (Date.now() - start > timeoutMs) return false;
        await new Promise(r => setTimeout(r, 50));
      }
      return true;
    };
    (async () => {
      if (!(await waitForClerk())) { if (!cancelled) setAuthError(true); return; }
      if (cancelled) return;
      await window.Clerk.load();
      if (!window.Clerk.user) {
        // Not signed in: open Clerk's sign-in modal in place, reloading the
        // console once the user authenticates.
        if (window.Clerk.openSignIn) {
          window.Clerk.openSignIn({ afterSignInUrl: window.location.href, afterSignUpUrl: window.location.href });
        } else if (window.Clerk.redirectToSignIn) {
          window.Clerk.redirectToSignIn({ afterSignInUrl: window.location.href, afterSignUpUrl: window.location.href });
        } else {
          window.location.href = 'index.html';
        }
        return;
      }
      if (cancelled) return;
      const u = window.Clerk.user;
      const email = u.primaryEmailAddress && u.primaryEmailAddress.emailAddress;
      setUsername(u.username || u.firstName || email || 'account');
      await Promise.all([refreshAll(), loadJoinToken()]);
      if (!cancelled) setReady(true);
    })();
    return () => { cancelled = true; };
  }, [refreshAll, loadJoinToken]);

  const signOut = () => {
    if (window.Clerk && window.Clerk.signOut) {
      window.Clerk.signOut().then(() => { window.location.href = 'index.html'; });
    } else {
      window.location.href = 'index.html';
    }
  };

  const openCreate = () => { setNewKeyName(""); setGenKey(null); setCopiedKey(false); setCopiedEndpoint(false); setShowCreate(true); };
  const createKey = async () => {
    setCreating(true);
    try {
      const res = await authedFetch('/api/keys', { method: 'POST', body: JSON.stringify({ name: newKeyName.trim() || 'untitled' }) });
      if (res.ok) {
        const data = await res.json();
        setGenKey(data.key);
        await loadKeys();
      }
    } catch (e) { console.error('Create key failed:', e); }
    finally { setCreating(false); }
  };
  const copyNewKey = () => { navigator.clipboard && genKey && navigator.clipboard.writeText(genKey).then(() => { setCopiedKey(true); setTimeout(() => setCopiedKey(false), 1500); }); };
  const copyEndpoint = () => { navigator.clipboard && navigator.clipboard.writeText(`${window.location.origin}/api/usage`).then(() => { setCopiedEndpoint(true); setTimeout(() => setCopiedEndpoint(false), 1500); }); };
  const closeCreate = () => { setShowCreate(false); setGenKey(null); setNewKeyName(""); setCopiedEndpoint(false); };
  const revoke = async (id) => {
    const res = await authedFetch(`/api/keys/${id}`, { method: 'DELETE' });
    if (res.ok) await loadKeys();
  };

  const onlineCount = nodes.filter(n => n.status === 'online').length;

  if (authError) {
    return (
      <div className="page-loading">
        <div>Authentication unavailable. <a href="index.html" style={{ color: "var(--accent)" }}>Return home</a></div>
      </div>
    );
  }
  if (!ready) {
    return (
      <React.Fragment>
        <header className="bar">
          <div className="wrap bar-inner">
            <a className="logo" href="index.html"><span className="bolt">{I.bolt}</span> LLMJob</a>
          </div>
        </header>
        <div className="page-loading"><div className="spinner"></div><div>Loading your console…</div></div>
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      <header className={`bar ${scrolled ? "scrolled" : ""}`}>
        <div className="wrap bar-inner">
          <a className="logo" href="index.html"><span className="bolt">{I.bolt}</span> LLMJob</a>
          <div className="bar-right">
            <span className="who">{username}</span>
            <button className="signout" onClick={signOut}>Sign out</button>
          </div>
        </div>
      </header>

      <main>
        <div className="wrap">
          {/* NODES */}
          <section id="nodes">
            <div className="sec-title">
              <div>
                <h1>Nodes</h1>
                <div className="sub">The machines connected to your cluster.</div>
              </div>
              <div className="node-actions">
                <span className={`status ${onlineCount > 0 ? 'on' : 'off'}`} style={{ fontSize: 13 }}><span className={`dot ${onlineCount > 0 ? 'on' : 'off'}`}></span> {onlineCount} online</span>
                <button className="btn-add btn-dark" onClick={openAdd}>{I.plus} Add node</button>
              </div>
            </div>
            <NodesTable nodes={nodes} loading={false} />
          </section>

          {/* API KEYS */}
          <section id="keys" style={{ marginTop: 48 }}>
            <div className="sec-title">
              <div>
                <h2>API</h2>
                <div className="sub">Create a key to get your endpoint and start making requests.</div>
              </div>
              <button className="btn-add" onClick={openCreate}>{I.plus} New key</button>
            </div>
            <div className="card">
              <div className="tscroll">
                <table style={{ minWidth: 860 }}>
                  <thead>
                    <tr>
                      <th>Name</th><th>Key</th><th>Last used</th><th>Usage</th><th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {keys.map((k) => (
                      <tr key={k.id}>
                        <td><span className="kname">{k.name}</span></td>
                        <td><span className="kmask">{k.masked}</span></td>
                        <td style={{ color: "var(--ink-2)" }}>{relTime(k.lastUsed)}</td>
                        <td className="mono" style={{ color: "var(--ink)" }}>{fmtTokens(k.usage)}<span className="unit">tok</span></td>
                        <td className="num"><button className="revoke-btn" onClick={() => revoke(k.id)}>Revoke</button></td>
                      </tr>
                    ))}
                    {keys.length === 0 && <tr><td colSpan="5"><div className="empty-state">No API keys yet. Create one to start making requests.</div></td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          {/* LOGS */}
          <section id="logs">
            <div className="logs-head">
              <div>
                <h2>Logs</h2>
                <div className="sub">View your request logs and history.</div>
              </div>
              <div className="controls">
                <button className={`ctrl-btn ${refreshing ? 'spin' : ''}`} title="Refresh" onClick={refreshAll} disabled={refreshing}>{I.refresh}</button>
              </div>
            </div>

            <LogsTable logs={logs} loading={false} />
          </section>
        </div>
      </main>

      {showAdd && (
        <div className="overlay" onClick={() => setShowAdd(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>Add a node</h3>
              <button className="x" onClick={() => setShowAdd(false)}>×</button>
            </div>
            <p>Run this on the machine you want to add (needs <span className="mono">curl</span> and <span className="mono">openssl</span>). It runs a small agent that connects the machine to your account:</p>
            <div className="cmd">
              <code>{joinLoading ? 'Generating your command…' : installCmd}</code>
              <button onClick={() => copyCmd(0, installCmd)} disabled={!joinToken}>{copiedCmd === 0 ? "copied" : "copy"}</button>
            </div>
            <p className="add-step-p" style={{ marginLeft: 0 }}>
              The node generates its own key locally — only its public key is sent.
              Keep this command private; anyone with it can add a node to your account.
              {' '}<a role="button" tabIndex="0" onClick={rotateToken} style={{ cursor: 'pointer' }}>Regenerate token</a>
            </p>
            <p className="hint">Once it connects, the node shows up here automatically.</p>
          </div>
        </div>
      )}

      {showCreate && (
        <div className="overlay" onClick={closeCreate}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>Create API key</h3>
              <button className="x" onClick={closeCreate}>×</button>
            </div>
            {!genKey ? (
              <React.Fragment>
                <div className="field">
                  <label>Key name</label>
                  <input value={newKeyName} onChange={e => setNewKeyName(e.target.value)} placeholder="e.g. laptop" autoFocus
                    onKeyDown={e => { if (e.key === 'Enter' && !creating) createKey(); }} />
                </div>
                <div className="modal-actions">
                  <button className="btn-sm" onClick={closeCreate}>Cancel</button>
                  <button className="btn-sm primary" onClick={createKey} disabled={creating}>{creating ? 'Creating…' : 'Create key'}</button>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <p>Here's your new key. Copy it now — you won't be able to see it again.</p>
                <div className="newkey-box">
                  <code>{genKey}</code>
                  <button onClick={copyNewKey}>{copiedKey ? "copied" : "copy"}</button>
                </div>
                <p>Send requests to this endpoint with an <code style={{ fontFamily: '"IBM Plex Mono", monospace', fontSize: 12.5 }}>Authorization: Bearer &lt;key&gt;</code> header:</p>
                <div className="newkey-box">
                  <code>POST {window.location.origin}/api/usage</code>
                  <button onClick={copyEndpoint}>{copiedEndpoint ? "copied" : "copy"}</button>
                </div>
                <div className="modal-actions">
                  <button className="btn-sm primary" onClick={closeCreate}>Done</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
