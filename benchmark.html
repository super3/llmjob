<html lang="en">
<head>

<title>LLMJob — MMLU across quants · google/gemma-4-26B-A4B</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root {
    --bg: #FBFAF8;
    --bg-2: #F3F1EC;
    --ink: #16160F;
    --ink-2: #4A4A42;
    --ink-3: #86857C;
    --line: #E4E1D9;
    --line-2: #D6D2C8;
    --accent: oklch(0.58 0.21 256);
    --online: oklch(0.66 0.16 150);
    --warn: oklch(0.72 0.15 67);
    --dark: #131310;
    --dark-2: #1C1C16;
    --dark-3: #26261E;
    --dark-line: #33332A;
    --dark-ink: #EDEBE3;
    --dark-ink-2: #9C9A8E;
    --dark-ink-3: #6E6D62;
    font-synthesis-weight: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Space Grotesk", sans-serif; line-height: 1.5;

    min-height: 100vh; display: flex; flex-direction: column;
  }
  .mono { font-family: "IBM Plex Mono", monospace; }
  .tnum { font-variant-numeric: tabular-nums; }
  a { color: inherit; text-decoration: none; }
  .wrap { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 32px; }

  .eyebrow { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); display: inline-flex; align-items: center; gap: 9px; }
  .eyebrow::before { content: ""; width: 18px; height: 1px; background: var(--line-2); }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--online); flex: none; }
  .dot.live { animation: blink 1.8s ease-in-out infinite; }
  @keyframes blink { 0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb,var(--online) 55%, transparent); } 60% { box-shadow: 0 0 0 7px transparent; } }

  /* nav */
  header.nav { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: saturate(1.2) blur(12px); border-bottom: 1px solid transparent; transition: border-color .2s ease; }
  header.nav.scrolled { border-color: var(--line); }
  .nav-inner { height: 66px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 18px; letter-spacing: -0.01em; }
  .logo .bolt { width: 28px; height: 28px; border-radius: 8px; background: var(--ink); color: var(--bg); display: grid; place-items: center; font-size: 15px; }
  .ghl { display: inline-flex; align-items: center; gap: 8px; font-family: "Space Grotesk", sans-serif; font-size: 15px; font-weight: 500; color: var(--ink); border: 1px solid var(--line-2); border-radius: 10px; padding: 13px 22px; transition: border-color .15s, background .15s; }
  .ghl:hover { border-color: var(--ink-3); background: var(--bg-2); }

  main { flex: 1; padding: 54px 0 64px; }
  .intro h1 { font-family: "IBM Plex Mono", monospace; font-size: clamp(22px, 3.6vw, 32px); font-weight: 500; letter-spacing: -0.02em; margin: 16px 0 0; line-height: 1.15; word-break: break-word; }
  .intro h1 .accent { color: var(--accent); }
  .intro .lede { font-size: 17px; color: var(--ink-2); margin: 14px 0 0; max-width: 40em; }

  .cards { margin-top: 8px; }
  .card-group { margin-top: 46px; }
  .card-group:first-child { margin-top: 30px; }
  .card-hd { display: flex; align-items: center; gap: 13px; padding-bottom: 14px; border-bottom: 2px solid var(--ink); }
  .card-hd .gpu-ic { width: 34px; height: 34px; border-radius: 9px; background: var(--ink); color: var(--bg); display: grid; place-items: center; flex: none; }
  .card-hd h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .card-hd .vbadge { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--ink-2); border: 1px solid var(--line-2); border-radius: 6px; padding: 3px 9px; white-space: nowrap; }
  .model-block { margin-top: 22px; }
  .model-hd { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .model-hd .mname { font-family: "IBM Plex Mono", monospace; font-size: 15px; font-weight: 500; color: var(--ink); }
  .model-hd .mdesc { font-size: 13px; color: var(--ink-3); }

  /* live hero card (dark) */
  .rig { margin-top: 34px; background: var(--dark); border: 1px solid var(--dark-line); border-radius: 16px; overflow: hidden; box-shadow: 0 30px 70px -45px rgba(0,0,0,.6); }
  .rig-top { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid var(--dark-line); gap: 12px; }
  .rig-id { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .rig-id .ic { width: 32px; height: 32px; border-radius: 9px; background: var(--dark-3); display: grid; place-items: center; color: var(--dark-ink); flex: none; }
  .rig-id .nm { font-size: 14px; font-weight: 500; color: var(--dark-ink); }
  .rig-id .sub { font-family: "IBM Plex Mono", monospace; font-size: 10.5px; color: var(--dark-ink-3); letter-spacing: .03em; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rig-status { display: inline-flex; align-items: center; gap: 7px; font-family: "IBM Plex Mono", monospace; font-size: 11px; border-radius: 99px; padding: 5px 11px; flex: none; }

  .score { padding: 24px 20px; display: flex; align-items: center; gap: 26px; border-bottom: 1px solid var(--dark-line); flex-wrap: wrap; }
  .score .big { display: flex; align-items: baseline; }
  .score .big .v { font-family: "IBM Plex Mono", monospace; font-size: 58px; font-weight: 500; color: var(--dark-ink); letter-spacing: -0.04em; line-height: 1; }
  .score .big .pc { font-family: "IBM Plex Mono", monospace; font-size: 22px; color: var(--dark-ink-2); margin-left: 2px; }
  .score-meta { flex: 1; min-width: 220px; }
  .score-meta .sm-l { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--dark-ink-3); }
  .score-meta .sm-sub { font-family: "IBM Plex Mono", monospace; font-size: 11.5px; color: var(--dark-ink-2); margin-top: 10px; line-height: 1.5; }
  .score-meta .prog { margin-top: 11px; }
  .score-meta .prog .bar { height: 6px; background: var(--dark-3); border-radius: 99px; overflow: hidden; }
  .score-meta .prog .bar i { display: block; height: 100%; background: var(--online); border-radius: 99px; transition: width .8s cubic-bezier(.4,0,.2,1); }
  .score-meta .prog .prog-meta { display: flex; justify-content: space-between; margin-top: 8px; font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--dark-ink-3); }

  .hstats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--dark-line); }
  .hstat { background: var(--dark); padding: 15px 18px; }
  .hstat .hl { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--dark-ink-3); }
  .hstat .hv { font-family: "IBM Plex Mono", monospace; font-size: 19px; font-weight: 500; color: var(--dark-ink); margin-top: 6px; letter-spacing: -0.01em; }
  .hstat .hv .u { font-size: 11px; color: var(--dark-ink-3); margin-left: 2px; }

  /* compare table */
  .compare { margin-top: 30px; }
  .compare-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .compare-head h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .compare-head .note { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--ink-3); }
  .tbl-wrap { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; }
  table.q { width: 100%; border-collapse: collapse; }
  table.q th { text-align: right; font-family: "IBM Plex Mono", monospace; font-size: 10.5px; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--bg-2); white-space: nowrap; }
  table.q th.l { text-align: left; }
  table.q td { padding: 14px 16px; border-bottom: 1px solid var(--line); font-size: 14px; text-align: right; }
  table.q td.l { text-align: left; }
  table.q tr:last-child td { border-bottom: none; }
  table.q tbody tr.run { background: color-mix(in srgb, var(--online) 7%, #fff); }
  table.q tbody tr.queued td { color: var(--ink-3); }
  .quant { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; font-weight: 500; color: var(--ink); }
  .qnote { font-family: "IBM Plex Mono", monospace; font-size: 10px; color: var(--ink-3); margin-left: 7px; }
  td.num { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  .mmlu-v { font-weight: 500; }
  .mmlu-v.best { color: var(--accent); }
  .st { font-family: "IBM Plex Mono", monospace; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; justify-content: flex-end; white-space: nowrap; }
  .st.done { color: var(--ink-3); }
  .st.run { color: var(--online); }
  .st.queued { color: var(--ink-3); }
  .dash { color: var(--ink-3); }

  .next { margin-top: 18px; display: flex; align-items: center; gap: 11px; padding: 14px 16px; border: 1px dashed var(--line-2); border-radius: 12px; color: var(--ink-2); font-size: 13.5px; background: var(--bg-2); }
  .next .pill { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); border: 1px solid var(--line-2); border-radius: 6px; padding: 3px 8px; background: #fff; flex: none; }

  .undernote { margin-top: 20px; font-size: 13px; color: var(--ink-3); }
  .undernote a { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--line-2); }
  .undernote a:hover { color: var(--ink); }

  footer { border-top: 1px solid var(--line); }
  .foot-inner { max-width: 1000px; margin: 0 auto; padding: 22px 32px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .foot-inner .c { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--ink-3); }
  .foot-inner .links a:hover { color: var(--ink); }

  @media (max-width: 560px) {
    .score { gap: 16px; }
    table.q th.hide, table.q td.hide { display: none; }
  }

  .fade-up { opacity: 0; transform: translateY(14px); transition: opacity .6s cubic-bezier(.2,.7,.2,1), transform .6s cubic-bezier(.2,.7,.2,1); }
  .fade-up.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .fade-up { opacity: 1; transform: none; transition: none; } .dot.live { animation: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ===========================================================
   EDIT ME — one model, MMLU across quantizations.
   Each row = same model, different quant/settings.
   mmlu = accuracy % · tps = decode tokens/sec · vram in GB
   status: "done" | "running" | "queued"
   running row also uses doneQ for live progress.
   =========================================================== */
const BENCH = { name: "MMLU", setup: "5-shot", subjects: 57, totalQ: 14042 };

/* Models grouped by GPU — the recommended models to run on each card.
   Add a card, then list models that fit, each with its quant runs. */
const CARDS = [
  {
    gpu: "RTX 4090",
    vram: 24,
    models: [
      {
        id: "google/gemma-4-26B-A4B",
        desc: "26B params · 4B active (MoE) · bartowski GGUF",
        runs: [
          { quant: "Q5_K_L",   mmlu: null, tps: null, vram: 19.50, ctx: "8K", status: "pending" },
          { quant: "Q5_K_M",   mmlu: null, tps: null, vram: 19.32, ctx: "8K", status: "pending" },
          { quant: "Q5_K_S",   mmlu: null, tps: null, vram: 18.13, ctx: "8K", status: "pending" },
          { quant: "Q4_K_L",   mmlu: null, tps: null, vram: 17.21, ctx: "8K", status: "pending" },
          { quant: "Q4_K_M",   mmlu: null, tps: null, vram: 17.04, ctx: "8K", status: "pending" },
          { quant: "Q4_1",     mmlu: null, tps: null, vram: 16.14, ctx: "8K", status: "pending" },
          { quant: "Q4_K_S",   mmlu: null, tps: null, vram: 15.84, ctx: "8K", status: "pending" },
          { quant: "Q4_0",     mmlu: null, tps: null, vram: 14.76, ctx: "8K", status: "pending" },
          { quant: "IQ4_NL",   mmlu: null, tps: null, vram: 14.70, ctx: "8K", status: "pending" },
          { quant: "IQ4_XS",   mmlu: null, tps: null, vram: 14.21, ctx: "8K", status: "pending" },
          { quant: "Q3_K_XL",  mmlu: null, tps: null, vram: 13.38, ctx: "8K", status: "pending" },
          { quant: "IQ3_M",    mmlu: null, tps: null, vram: 13.28, ctx: "8K", status: "pending" },
          { quant: "Q3_K_L",   mmlu: null, tps: null, vram: 13.20, ctx: "8K", status: "pending" },
          { quant: "Q3_K_M",   mmlu: null, tps: null, vram: 13.02, ctx: "8K", status: "pending" },
          { quant: "Q3_K_S",   mmlu: null, tps: null, vram: 12.55, ctx: "8K", status: "pending" },
          { quant: "IQ3_XS",   mmlu: null, tps: null, vram: 12.44, ctx: "8K", status: "pending" },
          { quant: "IQ3_XXS",  mmlu: null, tps: null, vram: 12.16, ctx: "8K", status: "pending" },
          { quant: "Q2_K_L",   mmlu: null, tps: null, vram: 11.13, ctx: "8K", status: "pending" },
          { quant: "Q2_K",     mmlu: null, tps: null, vram: 10.95, ctx: "8K", status: "pending" },
          { quant: "IQ2_M",    mmlu: null, tps: null, vram: 10.70, ctx: "8K", status: "pending" },
          { quant: "IQ2_S",    mmlu: null, tps: null, vram: 10.23, ctx: "8K", status: "pending" },
          { quant: "IQ2_XS",   mmlu: null, tps: null, vram: 10.13, ctx: "8K", status: "pending" },
          { quant: "IQ2_XXS",  mmlu: null, tps: null, vram: 9.66,  ctx: "8K", status: "pending" },
        ],
      },
    ],
  },
];
/* ===================== end editable data ===================== */

const I = {
  bolt: <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg>,
  beaker: <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3v6L4 19a1.5 1.5 0 0 0 1.3 2.2h13.4A1.5 1.5 0 0 0 20 19l-5-10V3"/><path d="M8 3h8M7 14h10"/></svg>,
  github: <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49v-1.7c-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.94.85.09-.66.35-1.12.63-1.37-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.94.68 1.9v2.81c0 .27.18.6.69.49A10.02 10.02 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>,
  chip: <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M10 3v2M14 3v2M10 19v2M14 19v2M3 10h2M3 14h2M19 10h2M19 14h2"/></svg>,
};

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rand = (a, b) => a + Math.random() * (b - a);

/* per-model quant comparison table */
function CompareTable({ runs }) {
  const scored = runs.filter(r => r.mmlu != null);
  const bestMmlu = scored.length ? Math.max(...scored.map(r => r.mmlu)) : null;
  const tpsd = runs.filter(r => r.tps != null);
  const bestTps = tpsd.length ? Math.max(...tpsd.map(r => r.tps)) : null;
  return (
    <div className="tbl-wrap">
      <table className="q">
        <thead>
          <tr>
            <th className="l">Quant</th>
            <th>MMLU</th>
            <th>Avg t/s</th>
            <th className="hide">VRAM (est.)</th>
            <th className="hide">Context</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {runs.map((r, i) => (
            <tr key={i} className={r.status}>
              <td className="l"><span className="quant">{r.quant}</span>{r.note && <span className="qnote">{r.note}</span>}</td>
              <td className="num">{r.mmlu != null ? <span className={`mmlu-v ${r.mmlu === bestMmlu ? "best" : ""}`}>{r.mmlu.toFixed(1)}%</span> : <span className="dash">—</span>}</td>
              <td className="num">{r.tps != null ? <span style={{ fontWeight: r.tps === bestTps ? 500 : 400 }}>{r.tps} t/s</span> : <span className="dash">—</span>}</td>
              <td className="num hide">{r.vram.toFixed(2)} GB</td>
              <td className="num hide">{r.ctx || "—"}</td>
              <td>{r.status === "done" ? <span className="st done">✓ done</span> : <span className="st queued">pending</span>}</td>
            </tr>
          ))}
          {runs.length === 0 && (
            <tr><td colSpan="6" style={{ textAlign: "center", padding: "44px 16px", color: "var(--ink-3)", fontFamily: '"IBM Plex Mono", monospace', fontSize: 13 }}>No benchmarks logged yet.</td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

/* a GPU card with its recommended models */
function CardGroup({ card }) {
  return (
    <div className="card-group">
      <div className="card-hd">
        <span className="gpu-ic">{I.chip}</span>
        <h2>{card.gpu}</h2>
        <span className="vbadge">{card.vram} GB</span>
      </div>
      {card.models.map((m, i) => (
        <div className="model-block" key={i}>
          <div className="model-hd">
            <span className="mname">{m.id}</span>
            <span className="mdesc">{m.desc}</span>
          </div>
          <CompareTable runs={m.runs} />
        </div>
      ))}
    </div>
  );
}

function App() {
  const [seen, setSeen] = useState(true);
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => { setSeen(true); }, []);
  useEffect(() => {
    const onS = () => setScrolled(window.scrollY > 8);
    window.addEventListener("scroll", onS); onS();
    return () => window.removeEventListener("scroll", onS);
  }, []);
  return (
    <React.Fragment>
      <header className={`nav ${scrolled ? "scrolled" : ""}`}>
        <div className="wrap nav-inner">
          <a className="logo" href="index.html"><span className="bolt">{I.bolt}</span> LLMJob</a>
          <a className="ghl" href="index.html">← Home</a>
        </div>
      </header>

      <main>
        <div className={`wrap fade-up ${seen ? "in" : ""}`}>
          <span className="eyebrow">Benchmark 01 · MMLU</span>
          <div className="intro">
            <h1>What to run on each card</h1>
            <p className="lede">MMLU accuracy and decode throughput for the models worth running on each GPU. Only the configs that actually fit a card's VRAM are listed.</p>
          </div>

          <div className="cards">
            {CARDS.map((c, i) => <CardGroup card={c} key={i} />)}
          </div>

          <div className="next" style={{ marginTop: 36 }}>
            <span className="pill">Next</span>
            <span>More cards as I get my hands on them — and agentic benchmarks (tool use, multi-step tasks) once the MMLU sweep is complete.</span>
          </div>
          <p className="undernote">Each model is scored with {BENCH.name} ({BENCH.setup}, {BENCH.subjects} subjects) at every quantization that fits the card.</p>
