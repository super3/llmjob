<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLMJob — What to run on RTX PRO 6000 &amp; RTX 5090</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%2316160F%22/><path transform=%22translate(26,26) scale(2)%22 d=%22M13 2 4 14h6l-1 8 9-12h-6l1-8z%22 fill=%22%23FBFAF8%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FBFAF8;
    --bg-2: #F3F1EC;
    --ink: #16160F;
    --ink-2: #4A4A42;
    --ink-3: #86857C;
    --line: #E4E1D9;
    --line-2: #D6D2C8;
    --accent: oklch(0.58 0.21 256);
    --online: oklch(0.66 0.16 150);
    --warn: oklch(0.72 0.15 67);
    font-synthesis-weight: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Space Grotesk", sans-serif; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  .mono { font-family: "IBM Plex Mono", monospace; }
  a { color: inherit; text-decoration: none; }
  .wrap { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 32px; }

  .eyebrow { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); display: inline-flex; align-items: center; gap: 9px; }
  .eyebrow::before { content: ""; width: 18px; height: 1px; background: var(--line-2); }

  /* nav */
  header.nav { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: saturate(1.2) blur(12px); border-bottom: 1px solid transparent; transition: border-color .2s ease; }
  header.nav.scrolled { border-color: var(--line); }
  .nav-inner { height: 66px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 18px; letter-spacing: -0.01em; }
  .logo .bolt { width: 28px; height: 28px; border-radius: 8px; background: var(--ink); color: var(--bg); display: grid; place-items: center; font-size: 15px; }
  .ghl { display: inline-flex; align-items: center; gap: 8px; font-family: "Space Grotesk", sans-serif; font-size: 15px; font-weight: 500; color: var(--ink); border: 1px solid var(--line-2); border-radius: 10px; padding: 13px 22px; transition: border-color .15s, background .15s; }
  .ghl:hover { border-color: var(--ink-3); background: var(--bg-2); }

  main { flex: 1; padding: 54px 0 64px; }
  .intro h1 { font-family: "IBM Plex Mono", monospace; font-size: clamp(22px, 3.6vw, 32px); font-weight: 500; letter-spacing: -0.02em; margin: 16px 0 0; line-height: 1.15; word-break: break-word; }
  .intro .lede { font-size: 17px; color: var(--ink-2); margin: 14px 0 0; }
  .intro .lede a { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--line-2); }
  .intro .lede a:hover { color: var(--ink); }

  .section { margin-top: 48px; }
  .section-hd { display: flex; align-items: center; gap: 13px; padding-bottom: 14px; border-bottom: 2px solid var(--ink); }
  .section-hd .gpu-ic { width: 34px; height: 34px; border-radius: 9px; background: var(--ink); color: var(--bg); display: grid; place-items: center; flex: none; }
  .section-hd h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .section-hd .vbadge { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--ink-2); border: 1px solid var(--line-2); border-radius: 6px; padding: 3px 9px; white-space: nowrap; }
  .section-sub { margin: 14px 0 16px; font-size: 14.5px; color: var(--ink-2); }
  .subtbl-hd { margin: 28px 0 12px; display: flex; align-items: baseline; gap: 10px; }
  .subtbl-hd h3 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .subtbl-hd .note { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--ink-3); }

  /* tables */
  .tbl-wrap { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; }
  table.q { width: 100%; border-collapse: collapse; }
  table.q th { text-align: right; font-family: "IBM Plex Mono", monospace; font-size: 10.5px; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--bg-2); white-space: nowrap; }
  table.q th.l { text-align: left; }
  table.q td { padding: 14px 16px; border-bottom: 1px solid var(--line); font-size: 14px; text-align: right; }
  table.q td.l { text-align: left; }
  table.q tr:last-child td { border-bottom: none; }
  table.q tbody tr.pick { background: color-mix(in srgb, var(--accent) 6%, #fff); }
  td.num { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  .mname { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; font-weight: 500; color: var(--ink); }
  .mlab { font-size: 12px; color: var(--ink-3); margin-left: 7px; }
  .quant { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; font-weight: 500; }
  .score-v { font-weight: 500; }
  .score-v.best { color: var(--accent); }
  .tag { font-family: "IBM Plex Mono", monospace; font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; border-radius: 5px; padding: 2px 7px; margin-left: 8px; white-space: nowrap; vertical-align: middle; }
  .tag.pick { background: color-mix(in srgb, var(--accent) 12%, #fff); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 30%, #fff); }
  .tag.ctx { background: var(--bg-2); color: var(--ink-2); border: 1px solid var(--line-2); }

  .reco { margin-top: 16px; display: flex; gap: 11px; padding: 15px 16px; border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 12px; background: #fff; font-size: 13.5px; color: var(--ink-2); }
  .reco .pill { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 30%, #fff); background: color-mix(in srgb, var(--accent) 8%, #fff); border-radius: 6px; padding: 3px 8px; flex: none; height: fit-content; margin-top: 1px; }
  .reco b { color: var(--ink); font-weight: 600; }
  .reco .mono { font-size: 12.5px; }

  .tbl-note { margin-top: 12px; font-size: 12.5px; color: var(--ink-3); }

  .next { margin-top: 40px; display: flex; align-items: center; gap: 11px; padding: 14px 16px; border: 1px dashed var(--line-2); border-radius: 12px; color: var(--ink-2); font-size: 13.5px; background: var(--bg-2); }
  .next .pill { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); border: 1px solid var(--line-2); border-radius: 6px; padding: 3px 8px; background: #fff; flex: none; }

  .undernote { margin-top: 20px; font-size: 13px; color: var(--ink-3); }
  .undernote a { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--line-2); }
  .undernote a:hover { color: var(--ink); }

  footer { border-top: 1px solid var(--line); }
  .foot-inner { max-width: 1000px; margin: 0 auto; padding: 22px 32px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .foot-inner .c { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--ink-3); }
  .foot-inner .links a:hover { color: var(--ink); }

  @media (max-width: 640px) {
    table.q th.hide, table.q td.hide { display: none; }
    .mlab { display: block; margin: 2px 0 0; }
  }

  .fade-up { opacity: 0; transform: translateY(14px); transition: opacity .6s cubic-bezier(.2,.7,.2,1), transform .6s cubic-bezier(.2,.7,.2,1); }
  .fade-up.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .fade-up { opacity: 1; transform: none; transition: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ===========================================================
   EDIT ME — data from Artificial Analysis Intelligence Index
   v4.0 (artificialanalysis.ai), June 2026. Scores are measured
   on full-precision models via API; quant configs are what
   actually fits each card at full native context.
   =========================================================== */

/* Top proprietary models — context for where open weights sit. */
const PROPRIETARY = [
  { rank: 1,  model: "Claude Fable 5",        lab: "Anthropic", score: 64.9, ctx: "1M" },
  { rank: 2,  model: "Claude Opus 4.8",       lab: "Anthropic", score: 61.4, ctx: "1M" },
  { rank: 3,  model: "GPT-5.5 (xhigh)",       lab: "OpenAI",    score: 60.2, ctx: "1M" },
  { rank: 4,  model: "GPT-5.5 (high)",        lab: "OpenAI",    score: 58.9, ctx: "1M" },
  { rank: 5,  model: "Claude Opus 4.7",       lab: "Anthropic", score: 57.3, ctx: "1M" },
  { rank: 6,  model: "Gemini 3.1 Pro Preview", lab: "Google",   score: 57.2, ctx: "1M" },
  { rank: 7,  model: "GPT-5.4 (xhigh)",       lab: "OpenAI",    score: 56.8, ctx: "1M" },
  { rank: 8,  model: "GPT-5.5 (medium)",      lab: "OpenAI",    score: 56.7, ctx: "1M" },
  { rank: 9,  model: "Gemini 3.5 Flash (high)",   lab: "Google", score: 55.3, ctx: "1M" },
  { rank: 10, model: "Gemini 3.5 Flash (medium)", lab: "Google", score: 54.8, ctx: "1M" },
];

/* Recommended open-weights models per GPU.
   Best quant that fits at full native context, KV cache included.
   pick: highlighted recommendation · tag: extra label on the row */
const GPUS = [
  {
    gpu: "RTX PRO 6000",
    vram: 96,
    kv: "INT8 KV cache, full native context",
    models: [
      { model: "Qwen3.6 27B (Reasoning)",       lab: "Alibaba",  score: 45.8, quant: "FP8",    ctx: "262K", weights: 28, kvgb: 8.2,  total: 36, headroom: 60, pick: true },
      { model: "KAT Coder Pro V2",              lab: "KwaiKAT",  score: 43.8, quant: "FP8",    ctx: "256K", weights: 30, kvgb: 8.0,  total: 38, headroom: 58 },
      { model: "Qwen3.6 35B A3B (Reasoning)",   lab: "Alibaba",  score: 43.5, quant: "FP8",    ctx: "262K", weights: 35, kvgb: 6.2,  total: 41, headroom: 55 },
      { model: "GLM-4.7 (Reasoning)",           lab: "Z AI",     score: 42.1, quant: "FP8",    ctx: "256K", weights: 50, kvgb: 6.4,  total: 56, headroom: 40 },
      { model: "Qwen3.5 27B (Reasoning)",       lab: "Alibaba",  score: 42.1, quant: "FP8",    ctx: "262K", weights: 28, kvgb: 8.2,  total: 36, headroom: 60 },
      { model: "Qwen3.5 122B A10B (Reasoning)", lab: "Alibaba",  score: 41.6, quant: "Q4_K_M", ctx: "262K", weights: 78, kvgb: 8.2,  total: 86, headroom: 10 },
    ],
    /* Models that only fit at 2-bit (INT4 KV). Scores are full-precision —
       Q2 materially degrades reasoning/tool use, so this tier is for
       context windows beyond 262K, not quality. */
    q2: [
      { model: "MiniMax-M2.7",                       lab: "MiniMax",  score: 49.6, nctx: "200K", octx: "200K", weights: 57, kvgb: 6.3,  total: 63, headroom: 33 },
      { model: "MiMo-V2.5",                          lab: "Xiaomi",   score: 49,   nctx: "1M",   octx: "512K", weights: 78, kvgb: 14.1, total: 92, headroom: 4 },
      { model: "DeepSeek V4 Flash (Reasoning, Max)", lab: "DeepSeek", score: 46.5, nctx: "1M",   octx: "1M",   weights: 71, kvgb: 10.4, total: 81, headroom: 15, pick: true, tag: "1M ctx" },
      { model: "DeepSeek V4 Flash (Reasoning, High)", lab: "DeepSeek", score: 46,  nctx: "1M",   octx: "1M",   weights: 71, kvgb: 10.4, total: 81, headroom: 15 },
      { model: "Step 3.7 Flash",                     lab: "StepFun",  score: 42.6, nctx: "256K", octx: "256K", weights: 49, kvgb: 1.6,  total: 51, headroom: 45 },
      { model: "Hy3-preview (Reasoning)",            lab: "Tencent",  score: 41.9, nctx: "256K", octx: "256K", weights: 74, kvgb: 7.0,  total: 81, headroom: 15 },
      { model: "MiniMax-M2.5",                       lab: "MiniMax",  score: 41.9, nctx: "200K", octx: "200K", weights: 57, kvgb: 6.3,  total: 63, headroom: 33 },
      { model: "MiMo-V2-Flash (Feb 2026)",           lab: "Xiaomi",   score: 41.5, nctx: "256K", octx: "256K", weights: 77, kvgb: 7.0,  total: 84, headroom: 12 },
      { model: "MiniMax-M2.1",                       lab: "MiniMax",  score: 39.4, nctx: "200K", octx: "200K", weights: 57, kvgb: 6.3,  total: 63, headroom: 33 },
    ],
    q2note: "Scores are full-precision (API-measured) — Q2 quantization materially degrades tool use and reasoning, often enough that a Q2 of a larger model underperforms a Q4 of a smaller one. After Q2 loss, none of these reliably beats the FP8 ★ pick above on intelligence — use this tier only when a workload needs more than 262K context. DeepSeek V4 Flash is the headline: the only single-card path to a genuine 1M-token window (MLA compresses KV aggressively). MiMo-V2.5 is VRAM-capped at ~512K; the MiniMax models are capped by their 200K native window. Step 3.7 Flash also fits at Q3 (~74 GB, ~22 GB headroom) — the best quality-per-GB option in this tier.",
    reco: <React.Fragment><b>Qwen3.6 27B @ FP8</b> + INT8 KV ≈ <span className="mono">36 GB</span> — highest AA score on the card with effectively zero quantization loss, and ~60 GB of headroom. With 96 GB, everything ≤50B runs at FP8, so quant quality loss disappears from this tier. Throughput alternative: <b>Qwen3.5 122B A10B @ Q4_K_M</b> — only 10B active params per token makes it ~2–3× faster in long agent loops, at a lower score plus Q4 loss.</React.Fragment>,
    note: "Score is full-precision (API-measured); Q2 rows lose meaningful quality. Qwen 27B / 122B use hybrid attention — only attention layers store KV, which is why long-context KV stays small.",
  },
  {
    gpu: "RTX 5090",
    vram: 32,
    kv: "K8/V4 KV cache, full native context",
    models: [
      { model: "Qwen3.6 27B (Reasoning)",     lab: "Alibaba", score: 45.8, quant: "Q6_K",   ctx: "262K", weights: 23,   kvgb: 6.2, total: 29, headroom: 3, pick: true },
      { model: "KAT Coder Pro V2",            lab: "KwaiKAT", score: 43.8, quant: "Q5_K_M", ctx: "256K", weights: 21,   kvgb: 6.0, total: 27, headroom: 5 },
      { model: "Qwen3.6 35B A3B (Reasoning)", lab: "Alibaba", score: 43.5, quant: "Q5_K_S", ctx: "262K", weights: 23.5, kvgb: 4.7, total: 28, headroom: 4 },
      { model: "GLM-4.7 (Reasoning)",         lab: "Z AI",    score: 42.1, quant: "Q3_K_M", ctx: "256K", weights: 25,   kvgb: 4.8, total: 30, headroom: 2 },
      { model: "Qwen3.5 27B (Reasoning)",     lab: "Alibaba", score: 42.1, quant: "Q6_K",   ctx: "262K", weights: 23,   kvgb: 6.2, total: 29, headroom: 3 },
    ],
    reco: <React.Fragment><b>Qwen3.6 27B @ Q6_K</b> + K8/V4 KV ≈ <span className="mono">29 GB</span> — the highest-fidelity quant of the highest-scoring model that fits at full 262K native context. If your agent loops inject heavy tool output, drop to Q5_K_M (~26 GB total, ~6 GB headroom) for comfort. GLM-4.7 offers 50B dense params, but its lower native score plus Q3 loss make it the worse pick.</React.Fragment>,
    note: "K8/V4 KV (q8_0 K / q4_0 V) instead of full INT8 spends the savings on higher-fidelity weights. All five fit at full native context; nothing else becomes viable at Q2 on 32 GB without CPU offload.",
  },
];
/* ===================== end editable data ===================== */

/* Leading proprietary score — all "% frontier" columns are relative to this. */
const FRONTIER = Math.max(...PROPRIETARY.map(r => r.score));
const pctFrontier = (score) => Math.round((score / FRONTIER) * 100) + "%";

const I = {
  bolt: <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg>,
  chip: <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M10 3v2M14 3v2M10 19v2M14 19v2M3 10h2M3 14h2M19 10h2M19 14h2"/></svg>,
  lock: <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>,
};

function ProprietaryTable() {
  const best = Math.max(...PROPRIETARY.map(r => r.score));
  return (
    <div className="tbl-wrap">
      <table className="q">
        <thead>
          <tr>
            <th>#</th>
            <th className="l">Model</th>
            <th className="hide">Lab</th>
            <th>AA Score</th>
            <th>% Frontier</th>
            <th className="hide">Context</th>
          </tr>
        </thead>
        <tbody>
          {PROPRIETARY.map((r) => (
            <tr key={r.rank}>
              <td className="num">{r.rank}</td>
              <td className="l"><span className="mname">{r.model}</span></td>
              <td className="hide" style={{ color: "var(--ink-2)" }}>{r.lab}</td>
              <td className="num"><span className={`score-v ${r.score === best ? "best" : ""}`}>{r.score.toFixed(1)}</span></td>
              <td className="num">{pctFrontier(r.score)}</td>
              <td className="num hide">{r.ctx}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function GpuSection({ gpu }) {
  return (
    <div className="section">
      <div className="section-hd">
        <span className="gpu-ic">{I.chip}</span>
        <h2>{gpu.gpu}</h2>
        <span className="vbadge">{gpu.vram} GB</span>
      </div>
      <p className="section-sub">Best quant per model that fits at full native context ({gpu.kv}).</p>
      <div className="tbl-wrap">
        <table className="q">
          <thead>
            <tr>
              <th className="l">Model</th>
              <th>AA Score</th>
              <th>% Frontier</th>
              <th>Quant</th>
              <th className="hide">Context</th>
              <th className="hide">Weights</th>
              <th className="hide">KV</th>
              <th>VRAM</th>
              <th>Headroom</th>
            </tr>
          </thead>
          <tbody>
            {gpu.models.map((m, i) => (
              <tr key={i} className={m.pick ? "pick" : ""}>
                <td className="l">
                  <span className="mname">{m.model}</span>
                  <span className="mlab">{m.lab}</span>
                  {m.pick && <span className="tag pick">★ Pick</span>}
                  {m.tag && <span className="tag ctx">{m.tag}</span>}
                </td>
                <td className="num"><span className={`score-v ${m.pick ? "best" : ""}`}>{m.score.toFixed(1)}</span></td>
                <td className="num">{pctFrontier(m.score)}</td>
                <td><span className="quant">{m.quant}</span></td>
                <td className="num hide">{m.ctx}</td>
                <td className="num hide">~{m.weights} GB</td>
                <td className="num hide">~{m.kvgb} GB</td>
                <td className="num">~{m.total} GB</td>
                <td className="num">{m.headroom} GB</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="reco">
        <span className="pill">★ Run this</span>
        <span>{gpu.reco}</span>
      </div>
      <p className="tbl-note">{gpu.note}</p>
      {gpu.q2 && (
        <React.Fragment>
          <div className="subtbl-hd">
            <h3>Fits at Q2 only</h3>
            <span className="note">2-bit weights · INT4 KV cache</span>
          </div>
          <div className="tbl-wrap">
            <table className="q">
              <thead>
                <tr>
                  <th className="l">Model</th>
                  <th>AA Score</th>
                  <th>% Frontier</th>
                  <th className="hide">Native ctx</th>
                  <th>Op ctx</th>
                  <th className="hide">Weights</th>
                  <th className="hide">KV</th>
                  <th>VRAM</th>
                  <th>Headroom</th>
                </tr>
              </thead>
              <tbody>
                {gpu.q2.map((m, i) => (
                  <tr key={i} className={m.pick ? "pick" : ""}>
                    <td className="l">
                      <span className="mname">{m.model}</span>
                      <span className="mlab">{m.lab}</span>
                      {m.pick && <span className="tag pick">★ {m.tag}</span>}
                    </td>
                    <td className="num"><span className={`score-v ${m.pick ? "best" : ""}`}>{m.score.toFixed(1)}</span></td>
                    <td className="num">{pctFrontier(m.score)}</td>
                    <td className="num hide">{m.nctx}</td>
                    <td className="num">{m.octx}</td>
                    <td className="num hide">~{m.weights} GB</td>
                    <td className="num hide">~{m.kvgb} GB</td>
                    <td className="num">~{m.total} GB</td>
                    <td className="num">{m.headroom} GB</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <p className="tbl-note">{gpu.q2note}</p>
        </React.Fragment>
      )}
    </div>
  );
}

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
