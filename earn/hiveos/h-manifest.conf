# HiveOS custom-miner manifest for LLMJob Earn (headless CLI).
#
# Flight sheet setup:
#   Miner            → Custom
#   Miner name       → llmjob-earn
#   Installation URL → https://github.com/super3/llmjob/releases/latest/download/llmjob-earn-hiveos.tar.gz
#   Wallet           → your prl1p… address, or prl1p…+mdl1p… to merge-mine MDL
#   Pool URL         → any placeholder (e.g. alphapool.tech:5566) — HiveOS requires
#                      it to save the flight sheet, but it's ignored (region auto-detected)
#   Extra config     → any extra CLI args, e.g. --region eu1 (optional)
#
# CUSTOM_VERSION is stamped by scripts/build-hiveos.mjs at package time.
CUSTOM_NAME=llmjob-earn
CUSTOM_VERSION=
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/llmjob-earn/llmjob-earn.conf
CUSTOM_LOG_BASENAME=/var/log/miner/custom/llmjob-earn/llmjob-earn
