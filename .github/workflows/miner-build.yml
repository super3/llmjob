name: Earn build (Windows)

# Builds the LLMJob Earn (client2) Windows app. Runs the unit tests, then
# produces the NSIS installer on a Windows runner and uploads it as an artifact.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    paths: [ 'client2/**', '.github/workflows/miner-build.yml' ]
  workflow_dispatch:

# A v* tag publishes the built installer to a GitHub Release (see the build step).
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Test (100% coverage gate)
        run: npm test

      - name: Build Windows installer (publishes to Releases on v* tags)
        run: npx electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: llmjob-earn-windows
          path: |
            client2/dist/*.exe
            client2/dist/*.blockmap
          if-no-files-found: error
