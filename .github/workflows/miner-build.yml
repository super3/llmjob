name: Earn build (Windows + Linux)

# Builds the LLMJob Earn (earn) desktop app for Windows and Linux. Runs the
# unit tests, then produces the NSIS installer (Windows) and AppImage (Linux)
# on their respective runners and uploads them as artifacts.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    paths: [ 'earn/**', '.github/workflows/miner-build.yml' ]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish the installers to a GitHub Release (v<version> from earn/package.json)'
        type: boolean
        default: false

# A v* tag — or a manual run with "publish" checked — publishes the installers
# to a GitHub Release (see the build step).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: llmjob-earn-windows
            dist_path: |
              earn/dist/*.exe
              earn/dist/*.blockmap
          - os: ubuntu-latest
            platform: linux
            artifact: llmjob-earn-linux
            dist_path: |
              earn/dist/*.AppImage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: earn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Test (100% coverage gate)
        run: npm test

      # Stage the miner into vendor/engine so the installer ships it and end
      # users don't fetch an unsigned binary at runtime. Best-effort: if the
      # download fails — or the runner's antivirus quarantines the miner before
      # it can be packaged — the build still succeeds and the app falls back to
      # the on-demand download (extraResources then ships only the README
      # placeholder). Making bundling reliable on a Defender-enabled runner is a
      # separate decision (e.g. a self-hosted runner) and is intentionally not
      # done here.
      - name: Bundle mining engine — Windows (best-effort)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = "$env:RUNNER_TEMP\engine.zip"
          Invoke-WebRequest 'https://pearl.alphapool.tech/downloads/AlphaMiner-Pearl-Windows.zip' -OutFile $zip
          $tmp = "$env:RUNNER_TEMP\engine-x"
          Expand-Archive -LiteralPath $zip -DestinationPath $tmp -Force
          $exe = Get-ChildItem $tmp -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw 'no .exe inside engine archive' }
          Copy-Item $exe.FullName 'vendor/engine/alpha-miner-windows.exe' -Force
          Write-Host "Bundled engine: $((Get-Item 'vendor/engine/alpha-miner-windows.exe').Length) bytes"

      # No Linux engine is bundled: the engine version is chosen per rig at run
      # time from the NVIDIA driver (driver >= 580 gets the faster CUDA 13
      # build), so a single baked-in binary would defeat the choice. The app
      # downloads the right versioned build on first Start, exactly like the
      # CLI and HiveOS package always have.

      - name: Build installer (publishes on v* tag or manual publish)
        run: npx electron-builder --${{ matrix.platform }} --publish ${{ (startsWith(github.ref, 'refs/tags/v') || inputs.publish) && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Package the headless CLI (src/cli) into a standalone single-file Linux
      # binary via Node SEA. This is the self-updating artifact: the running
      # binary pulls a newer copy of itself from the release (src/cli/selfUpdater.js).
      - name: Package headless CLI binary (Linux)
        if: runner.os == 'Linux'
        run: npm run dist:cli

      # Wrap the CLI binary in the HiveOS custom-miner package (hiveos/ hook
      # scripts + binary → llmjob-earn-hiveos-<version>.tar.gz, plus an
      # unversioned legacy copy), the file flight sheets install from.
      - name: Package HiveOS custom miner (Linux)
        if: runner.os == 'Linux'
        run: npm run dist:hiveos

      # Attach the CLI binary and the HiveOS package to the same GitHub Release
      # electron-builder published to (v<version> from package.json), so the
      # self-updater and flight sheets can find them. Only on a v* tag or a
      # manual publish.
      - name: Publish CLI + HiveOS package to release (Linux, on v* tag or manual publish)
        if: runner.os == 'Linux' && (startsWith(github.ref, 'refs/tags/v') || inputs.publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v$VERSION" dist/llmjob-earn-cli-linux "dist/llmjob-earn-hiveos-$VERSION.tar.gz" dist/llmjob-earn-hiveos.tar.gz --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist_path }}
          if-no-files-found: error

      - name: Upload CLI binary artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: llmjob-earn-cli-linux
          path: |
            earn/dist/llmjob-earn-cli-linux
            earn/dist/llmjob-earn-hiveos-*.tar.gz
            earn/dist/llmjob-earn-hiveos.tar.gz
          if-no-files-found: error
