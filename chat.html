<style>
  :root {
    --bg: #fcfcfb;
    --ink: #0e0f10;
    --muted-2: #8a8f98;
    --muted-3: #9a9da1;
    --line: #e3e1d9;
    --accent: #2563eb;
    --dark: #1a1a17;
    font-synthesis-weight: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: "Schibsted Grotesk", sans-serif; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
  ::selection { background: #d7f3df; }
  input::placeholder, textarea::placeholder { color: #9a9da1; }
  a { color: inherit; text-decoration: none; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

  /* nav */
  nav.nav { max-width: 1136px; width: 100%; box-sizing: border-box; margin: 0 auto; padding: 26px 28px; display: flex; align-items: center; justify-content: space-between; flex: none; }
  .logo { font-weight: 700; font-size: 21px; letter-spacing: -.02em; display: inline-flex; align-items: center; gap: 11px; color: var(--ink); }
  .logo .bolt { display: inline-flex; width: 38px; height: 38px; border-radius: 11px; background: var(--dark); align-items: center; justify-content: center; flex: none; }
  .nav-right { display: flex; align-items: center; gap: 26px; }
  .nav-link { font-size: 15px; font-weight: 500; color: var(--ink); transition: opacity .15s; }
  .nav-link:hover { opacity: .65; }
  .nav-link.active { color: var(--accent); font-weight: 600; }
  .btn-discord { color: #fff; background: var(--dark); font-size: 15px; font-weight: 600; padding: 9px 17px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px; transition: transform .12s ease, box-shadow .15s ease; }
  .btn-discord:hover { box-shadow: 0 8px 20px -10px rgba(26,26,23,.6); }
  .btn-discord:active { transform: translateY(1px); }
  @media (max-width: 720px) { nav.nav { padding: 20px 18px; } .nav-right { gap: 16px; } }
  @media (max-width: 460px) { .nav-right { gap: 13px; } .btn-discord { padding: 9px 11px; } .btn-discord .dc-txt { display: none; } }

  /* chat shell */
  .chat-wrap { max-width: 1136px; width: 100%; box-sizing: border-box; margin: 6px auto 0; padding: 0 28px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .chat-inner { flex: 1; min-height: 480px; display: flex; flex-direction: column; position: relative; }
  .msg-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 20px 0; }
  .msg-col { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* empty state */
  .empty { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 7vh; }
  .empty .bolt { display: inline-flex; width: 44px; height: 44px; border-radius: 12px; background: var(--dark); align-items: center; justify-content: center; }
  .empty h2 { font-weight: 800; font-size: 25px; letter-spacing: -.03em; margin: 16px 0 0; }
  .empty p { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; color: var(--muted-3); margin: 9px 0 0; }
  .empty .served { font-family: "IBM Plex Mono", monospace; font-size: 11.5px; color: #b7bac0; margin: 6px 0 0; min-height: 15px; }
  .sugg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 26px; width: 100%; }
  .sugg-card { border: 1px solid #ebeae5; border-radius: 12px; padding: 13px 15px; background: #fff; text-align: left; cursor: pointer; transition: border-color .12s; }
  .sugg-card:hover { border-color: var(--accent); }
  .sugg-card .t { font-size: 13.5px; font-weight: 600; letter-spacing: -.01em; }
  .sugg-card .s { font-size: 12px; color: var(--muted-2); margin-top: 3px; }
  @media (max-width: 560px) { .sugg { grid-template-columns: 1fr; } }

  /* messages */
  .row-user { display: flex; justify-content: flex-end; }
  .bubble-user { background: var(--dark); color: #fff; border-radius: 15px 15px 4px 15px; padding: 10px 15px; max-width: 75%; font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; }
  .row-ai { display: flex; gap: 12px; align-items: flex-start; }
  .row-ai .av { display: inline-flex; width: 25px; height: 25px; border-radius: 8px; background: var(--dark); align-items: center; justify-content: center; flex: none; margin-top: 2px; }
  .row-ai .body { flex: 1; min-width: 0; }
  .row-ai .text { font-size: 14px; line-height: 1.6; color: #1d1f21; white-space: pre-wrap; word-wrap: break-word; }
  .row-ai .meta { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted-3); margin-top: 7px; }
  .cursor { animation: blink 1s step-end infinite; }

  /* composer */
  .composer-hold { flex: none; padding: 12px 0 0; }
  .composer { max-width: 820px; margin: 0 auto; }
  form.box { display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 14px 10px 10px 16px; box-shadow: 0 2px 10px -6px rgba(40,50,70,.15); }
  form.box textarea { width: 100%; box-sizing: border-box; border: none; outline: none; background: transparent; resize: none; font-family: inherit; font-size: 14.5px; line-height: 1.5; color: var(--ink); padding: 0; }
  .composer-bar { display: flex; align-items: center; gap: 10px; }
  .icon-btn { width: 34px; height: 34px; flex: none; border: 1px solid var(--line); background: #fff; border-radius: 9px; color: #6b7077; display: grid; place-items: center; cursor: pointer; transition: border-color .14s, color .14s; }
  .icon-btn:hover { border-color: var(--muted-3); color: var(--ink); }
  select.convo { flex: none; height: 34px; box-sizing: border-box; font-family: inherit; font-size: 12.5px; font-weight: 500; color: #6b7077; background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 0 10px; outline: none; cursor: pointer; max-width: 190px; transition: border-color .14s; }
  select.convo:hover { border-color: var(--muted-3); }
  .spacer { flex: 1; }
  select.model { appearance: none; -webkit-appearance: none; flex: none; border: none; background: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%228%22 height=%225%22 viewBox=%220 0 8 5%22%3E%3Cpath d=%22M1 1l3 3 3-3%22 stroke=%22%238a8f98%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/%3E%3C/svg%3E') right center no-repeat; font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--muted-2); outline: none; cursor: pointer; padding: 2px 14px 2px 0; }
  .send { width: 34px; height: 34px; flex: none; border: none; border-radius: 9px; background: #e8e6df; color: #b4b1a6; display: grid; place-items: center; cursor: not-allowed; transition: background .15s; }
  .send.on { background: var(--accent); color: #fff; cursor: pointer; }
  .foot-pad { flex: none; height: 20px; }
</style>

<div class="chat-wrap">
  <div class="chat-inner">
    <div class="msg-scroll" id="scroll">

    </div>

    <div class="composer-hold">

<script>
(function () {
  'use strict';

  // The site (GitHub Pages) and the API (Railway) are different origins, so use
  // the absolute API base in production and the local server in dev — the same
  // pattern as network.html / the dashboard.
  var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:3001' : 'https://llmjob-production.up.railway.app';

  var BOLT = '<svg width="21" height="21" viewBox="0 0 24 24" fill="#fff"><path d="M13 2 L4 14 h6 l-1 8 10-13 h-7 l1-7 z"></path></svg>';
  var AV = '<svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M13 2 L4 14 h6 l-1 8 10-13 h-7 l1-7 z"></path></svg>';

  var SUGGESTIONS = [
    { title: 'What is LLMJob?', sub: 'the 30-second version', prompt: 'What is LLMJob? Give me the 30-second version.' },
    { title: 'What is PPLNS?', sub: 'how payouts work', prompt: 'Explain PPLNS mining payouts in plain English.' },
    { title: 'Help me write an email', sub: 'drafts in seconds', prompt: 'Help me write a short, friendly email asking my landlord to fix the heater.' }
  ];

  // Fallback model list if /api/chat/models can't be reached.
  var FALLBACK_MODELS = [
    { id: 'meta-llama/llama-3.3-70b-instruct', label: 'Llama 3.3 70B' },
    { id: 'qwen/qwen-2.5-7b-instruct', label: 'Qwen 2.5 7B' }
  ];

  var LS_KEY = 'llmjob_chats';

  // ── State ──────────────────────────────────────────────────────────────────
  var state = {
    activeId: 'new',
    messages: [],      // { role: 'user'|'assistant', text, meta? }
    models: FALLBACK_MODELS.slice(),
    model: FALLBACK_MODELS[0].id,
    streaming: false,
    streamText: ''
  };

  var el = {
    col: document.getElementById('col'),
    scroll: document.getElementById('scroll'),
    form: document.getElementById('form'),
    input: document.getElementById('input'),
    send: document.getElementById('send'),
    newChat: document.getElementById('newChat'),
    convo: document.getElementById('convo'),
    model: document.getElementById('model')
  };

  // ── localStorage-backed recent chats (prompts never leave the browser) ───────
  function loadChats() {
    try { var v = JSON.parse(localStorage.getItem(LS_KEY)); return Array.isArray(v) ? v : []; }
    catch (e) { return []; }
  }
  function saveChats(chats) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(chats.slice(0, 30))); } catch (e) { /* private mode */ }
  }
  function persistActive() {
    if (state.activeId === 'new' || !state.messages.length) return;
    var chats = loadChats();
    var title = firstUserText(state.messages) || 'New chat';
    var entry = { id: state.activeId, title: title.slice(0, 44), messages: state.messages, updated: nowSec() };
    var idx = chats.findIndex(function (c) { return c.id === state.activeId; });
    if (idx >= 0) chats.splice(idx, 1);
    chats.unshift(entry);
    saveChats(chats);
    renderConvoOptions();
  }
  function firstUserText(msgs) {
    for (var i = 0; i < msgs.length; i++) if (msgs[i].role === 'user') return msgs[i].text;
    return '';
  }
  function nowSec() { return Math.floor(Date.now() / 1000); }
  function newId() { return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

  function renderConvoOptions() {
    var chats = loadChats();
    var html = '<option value="new">Recent chats…</option>';
    for (var i = 0; i < chats.length; i++) {
      var sel = chats[i].id === state.activeId ? ' selected' : '';
      html += '<option value="' + esc(chats[i].id) + '"' + sel + '>' + esc(chats[i].title) + '</option>';
    }
    el.convo.innerHTML = html;
    el.convo.value = chats.some(function (c) { return c.id === state.activeId; }) ? state.activeId : 'new';
  }

  // ── Rendering ────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function render() {
    var html = '';
    if (state.messages.length === 0 && !state.streaming) {
      html += emptyStateHtml();
    } else {
      for (var i = 0; i < state.messages.length; i++) html += messageHtml(state.messages[i]);
      if (state.streaming) html += streamingHtml(state.streamText);
    }
    el.col.innerHTML = html;
    // wire suggestion cards
    var cards = el.col.querySelectorAll('.sugg-card');
    for (var j = 0; j < cards.length; j++) {
      (function (idx) {
        cards[idx].addEventListener('click', function () { send(SUGGESTIONS[idx].prompt); });
      })(j);
    }
    scrollToBottom();
    syncSend();
  }

  function emptyStateHtml() {
    var cards = '';
    for (var i = 0; i < SUGGESTIONS.length; i++) {
      cards += '<div class="sugg-card" data-i="' + i + '">' +
        '<div class="t">' + esc(SUGGESTIONS[i].title) + '</div>' +
        '<div class="s">' + esc(SUGGESTIONS[i].sub) + '</div></div>';
    }
    return '<div class="empty">' +
      '<span class="bolt">' + BOLT + '</span>' +
      '<h2>What can I help with?</h2>' +
      '<p>Free chat, gated through the LLMJob endpoint.</p>' +
      '<p class="served" id="served"></p>' +
      '<div class="sugg">' + cards + '</div></div>';
  }

  function messageHtml(m) {
    if (m.role === 'user') {
      return '<div><div class="row-user"><div class="bubble-user">' + esc(m.text) + '</div></div></div>';
    }
    var meta = m.meta ? '<div class="meta">' + esc(m.meta) + '</div>' : '';
    return '<div><div class="row-ai"><span class="av">' + AV + '</span>' +
      '<div class="body"><div class="text">' + esc(m.text) + '</div>' + meta + '</div></div></div>';
  }

  function streamingHtml(text) {
    return '<div><div class="row-ai"><span class="av">' + AV + '</span>' +
      '<div class="body"><div class="text">' + esc(text) + '<span class="cursor">▍</span></div></div></div></div>';
  }

  function scrollToBottom() { el.scroll.scrollTop = el.scroll.scrollHeight; }

  function currentLabel() {
    for (var i = 0; i < state.models.length; i++) if (state.models[i].id === state.model) return state.models[i].label;
    return state.model;
  }

  // ── Send / stream ────────────────────────────────────────────────────────────
  function canSend() { return !state.streaming && !!el.input.value.trim(); }
  function syncSend() {
    var ok = canSend();
    el.send.classList.toggle('on', ok);
    el.send.disabled = !ok;
  }

  function send(text) {
    if (state.streaming) return;
    var msg = String(text == null ? el.input.value : text).trim();
    if (!msg) return;
    if (state.activeId === 'new') state.activeId = newId();
    state.messages.push({ role: 'user', text: msg });
    el.input.value = '';
    autoGrow();
    render();
    stream();
  }

  function stream() {
    state.streaming = true;
    state.streamText = '';
    render();

    var payload = {
      model: state.model,
      messages: state.messages.map(function (m) { return { role: m.role, content: m.text }; })
    };

    fetch(API_BASE + '/api/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function (resp) {
      if (!resp.ok) {
        return resp.json().catch(function () { return null; }).then(function (body) {
          var m = (body && body.error && body.error.message) || 'The chat service is unavailable right now.';
          finishWithError(m);
        });
      }
      return readStream(resp);
    }).catch(function () {
      finishWithError('Could not reach the chat service. Check your connection and try again.');
    });
  }

  // Read our small SSE protocol: {delta}, {done,meta}, {error}, then [DONE].
  function readStream(resp) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';
    var meta = null;
    var errored = null;

    function pump() {
      return reader.read().then(function (r) {
        if (r.done) return done();
        buf += decoder.decode(r.value, { stream: true });
        var idx;
        while ((idx = buf.indexOf('\n')) >= 0) {
          var line = buf.slice(0, idx).trim();
          buf = buf.slice(idx + 1);
          if (!line || line.indexOf('data:') !== 0) continue;
          var data = line.slice(5).trim();
          if (data === '[DONE]') { done(); return; }
          var obj;
          try { obj = JSON.parse(data); } catch (e) { continue; }
          if (obj.delta) { state.streamText += obj.delta; render(); }
          else if (obj.done) { meta = obj.meta; }
          else if (obj.error) { errored = obj.error; }
        }
        return pump();
      });
    }

    function done() {
      if (errored) { finishWithError(errored); return; }
      finishAssistant(state.streamText, meta);
    }

    return pump();
  }

  function metaLine(meta) {
    var model = (meta && meta.model) || currentLabel();
    // Prefer our friendly label over a long provider id.
    var friendly = currentLabel();
    if (model && model.indexOf('/') >= 0 && friendly) model = friendly;
    var tps = meta && typeof meta.tokensPerSecond === 'number' ? meta.tokensPerSecond : null;
    return tps != null ? model + ' · ' + tps.toFixed(1) + ' tok/s' : model;
  }

  function finishAssistant(text, meta) {
    state.streaming = false;
    state.streamText = '';
    state.messages.push({ role: 'assistant', text: text || '', meta: metaLine(meta) });
    render();
    persistActive();
    refreshServed();
  }

  function finishWithError(message) {
    state.streaming = false;
    state.streamText = '';
    state.messages.push({ role: 'assistant', text: message });
    render();
    persistActive();
  }

  // ── Conversation controls ────────────────────────────────────────────────────
  function newChat() {
    state.activeId = 'new';
    state.messages = [];
    state.streaming = false;
    state.streamText = '';
    el.input.value = '';
    autoGrow();
    renderConvoOptions();
    render();
    refreshServed();
  }

  function loadConvo(id) {
    if (id === 'new') { newChat(); return; }
    var chats = loadChats();
    var c = chats.find(function (x) { return x.id === id; });
    if (!c) { newChat(); return; }
    state.activeId = id;
    state.messages = (c.messages || []).slice();
    state.streaming = false;
    state.streamText = '';
    render();
    renderConvoOptions();
  }

  // ── Free-usage counter ───────────────────────────────────────────────────────
  function refreshServed() {
    var node = document.getElementById('served');
    if (!node) return;
    fetch(API_BASE + '/api/chat/usage', { headers: { Accept: 'application/json' } })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (u) {
        if (!u || !u.totals) return;
        var live = document.getElementById('served');
        if (!live) return;
        var total = u.totals.totalTokens || 0;
        if (total > 0) live.textContent = total.toLocaleString() + ' tokens served free so far';
      })
      .catch(function () { /* offline — leave it blank */ });
  }

  // ── Model select ─────────────────────────────────────────────────────────────
  function renderModelOptions() {
    var html = '';
    for (var i = 0; i < state.models.length; i++) {
      html += '<option value="' + esc(state.models[i].id) + '">' + esc(state.models[i].label) + '</option>';
    }
    el.model.innerHTML = html;
    el.model.value = state.model;
    sizeModelSelect();
  }
  function sizeModelSelect() {
    el.model.style.width = 'calc(' + currentLabel().length + 'ch + 16px)';
  }
  function loadModels() {
    fetch(API_BASE + '/api/chat/models', { headers: { Accept: 'application/json' } })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (d && Array.isArray(d.models) && d.models.length) {
          state.models = d.models;
          state.model = d.models[0].id;
          renderModelOptions();
        }
      })
      .catch(function () { /* keep fallback models */ });
  }

  // ── Composer behaviour ───────────────────────────────────────────────────────
  function autoGrow() {
    el.input.style.height = 'auto';
    el.input.style.height = Math.min(el.input.scrollHeight, 200) + 'px';
  }

  el.form.addEventListener('submit', function (e) { e.preventDefault(); send(); });
  el.input.addEventListener('input', function () { autoGrow(); syncSend(); });
  el.input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  el.newChat.addEventListener('click', newChat);
  el.convo.addEventListener('change', function (e) { loadConvo(e.target.value); });
  el.model.addEventListener('change', function (e) { state.model = e.target.value; sizeModelSelect(); });

  // ── Boot ─────────────────────────────────────────────────────────────────────
  renderModelOptions();
  renderConvoOptions();
  render();
  loadModels();
  refreshServed();
})();
</script>

</body>
</html>
